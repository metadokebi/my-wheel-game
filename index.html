    <style>
        :root {
            --bg-top: #1e2128; --bg-bottom: #0e1013;
            --card: #1a1d23; --accent: #00f2ff;
            --gold: #ffcc00; --blue: #00d9ff; 
            --red: #ff3333; --black: #444444; 
            --text-muted: #8899aa; --nav-bg: #16191e;
            --point-color: #00d9ff; --buy-color: #fff200;

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100dvh; overflow: hidden; touch-action: manipulation; background: #1e2128; color: white; font-family: 'Pretendard', sans-serif; }
        .main-container { width: 100%; max-width: 500px; height: 100%; margin: 0 auto; display: flex; flex-direction: column; position: relative; overflow-x: hidden; }

        /* [골든마스터] 언어 선택 */
        #langOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .lang-list { display: flex; flex-direction: column; gap: 12px; width: 240px; }
        .lang-btn { background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.25); color: #fff; padding: 18px 20px; border-radius: 12px; font-size: 1rem; font-weight: 700; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: background 0.2s; }

        header { padding: 12px 18px; background: rgba(0,0,0,0.4); display: flex; justify-content: space-between; align-items: center; z-index: 100; flex-shrink: 0; }
        .user-id { font-size: 0.8rem; font-weight: 700; border-left: 3px solid var(--accent); padding-left: 10px; }
        .balance-box { background: rgba(0, 217, 255, 0.1); padding: 5px 8px; border-radius: 6px; border: 1px solid var(--point-color); color: var(--point-color); font-weight: 800; font-size: 0.75rem; height: 32px; display: flex; align-items: center; justify-content: center; min-width: 95px; }
        #btnBuyTop { background: rgba(255, 242, 0, 0.1); padding: 5px 8px; border-radius: 6px; border: 1px solid var(--buy-color); color: var(--buy-color); font-weight: 900; font-size: 0.75rem; cursor: pointer; height: 32px; display: flex; align-items: center; justify-content: center; gap: 4px; text-shadow: 0 0 5px rgba(255, 242, 0, 0.5); min-width: 95px; }

        /* [복구] 상단 결과 바 */
        .rolls-wrapper { width: 100%; padding: 8px 15px; background: rgba(0,0,0,0.15); border-bottom: 1px solid #333; flex-shrink: 0; display: flex; justify-content: center; align-items: flex-start; min-height: 55px; }
        .history-strip { display: flex; gap: 5px; height: 40px; width: auto; align-items: flex-start; justify-content: center; overflow: hidden; }
        .hist-bar { width: 3px; border-radius: 1.5px; flex-shrink: 0; transition: all 0.3s; }
        .hist-bar.h-black { height: 16px; opacity: 0.6; }
        .hist-bar.h-red { height: 24px; opacity: 0.9; }
        .hist-bar.h-blue { height: 32px; opacity: 1; }
        .hist-bar.h-gold { height: 37px; width: 4px; box-shadow: 0 0 10px var(--gold); z-index: 5; }

        .timer-container { width: 100%; height: 6px; background: #000; position: relative; flex-shrink: 0; }
        #timerBar { position: absolute; left: 0; top: 0; height: 100%; width: 0%; transition: width 0.1s linear; }

        .content-view { flex: 1; overflow-y: auto; display: none; padding-bottom: 90px; width: 100%; align-items: center; }
        .content-view.active { display: flex; flex-direction: column; }

        /* [복구] 메인 게임 휠 */
        .wheel-section { position: relative; margin: 25px 0; width: 230px; height: 230px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        #wheelCanvas { width: 100%; height: 100%; border-radius: 50%; }
        .wheel-logo { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; font-weight: 900; font-size: 1.8rem; color: var(--accent); text-shadow: 0 0 10px var(--accent); opacity: 0.8; pointer-events: none; }
        .pointer { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); width: 14px; height: 20px; background: #fff; clip-path: polygon(50% 100%, 0% 0%, 100% 0%); z-index: 25; transition: background-color 0.1s linear; }

        /* [배틀 전용 UI] */
        .battle-lobby-list { width: 92%; display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px 0; }
        .room-card { background: var(--card); border: 1px solid #333; border-radius: 15px; padding: 15px; display: flex; flex-direction: column; align-items: center; gap: 10px; position: relative; cursor: pointer; }
        .room-mini-wheel { width: 60px; height: 60px; border-radius: 50%; border: 3px solid #222; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 900; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .room-status { font-size: 0.6rem; color: var(--accent); font-weight: 800; }
        
        #pvpBattleView { width: 100%; display: none; flex-direction: column; align-items: center; padding-top: 20px; }
        .pvp-wheel-area { width: 280px; height: 280px; position: relative; margin-bottom: 30px; }
        #pvpWheelCanvas { width: 100%; height: 100%; border-radius: 50%; box-shadow: 0 0 30px rgba(0,0,0,0.5); }

        .overlay-container { width: 100%; padding: 0 15px; position: relative; flex-shrink: 0; }
        .controls { position: relative; width: 100%; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #333; overflow: hidden; }
        #betOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75); z-index: 100; display: none; align-items: center; justify-content: center; border-radius: 12px; }

        #betInput { flex: 1; background: #000; border: 1px solid #333; color: var(--accent); padding: 12px; border-radius: 8px; text-align: center; font-weight: 900; outline: none; }
        .bet-buttons { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 12px; }
        .btn { height: 60px; background: transparent; border: 1.5px solid transparent; border-radius: 4px; font-weight: 900; font-size: 1.1rem; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; }

        .btn.selected.btn-red { background: var(--red); color: #fff; }
        .btn.selected.btn-blue { background: var(--blue); color: #fff; }
        .btn.selected.btn-gold { background: var(--gold); color: #000; }

        .live-betting-area { width: 100%; margin-top: 15px; padding: 10px; background: rgba(255,255,255,0.02); border-radius: 12px; border: 1px solid #333; }

        .col-total { font-size: 0.6rem; font-weight: 800; color: var(--accent); }
        .bet-list { padding: 3px; flex: 1; display: flex; flex-direction: column; gap: 3px; overflow: hidden; }
        .bet-item { display: flex; justify-content: space-between; font-size: 0.48rem; font-weight: 700; background: rgba(255,255,255,0.05); padding: 2px; border-radius: 3px; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: flex-end; justify-content: center; z-index: 1000; }
        .modal-content { background: #1a1d26; border-radius: 20px 20px 0 0; width: 100%; max-width: 500px; padding: 25px; border-top: 1px solid #333; }
        .color-btn { flex: 1; height: 50px; border-radius: 6px; border: 1.5px solid transparent; background: transparent; font-weight: 900; font-size: 0.8rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .color-btn.active.btn-black { background: var(--black) !important; color: #fff !important; }
        .color-btn.active.btn-red { background: var(--red) !important; color: #fff !important; }
        .color-btn.active.btn-blue { background: var(--blue) !important; color: #fff !important; }
        .color-btn.active.btn-gold { background: var(--gold) !important; color: #000 !important; }
        
        .btn-create-final { width: 100%; height: 55px; background: var(--battle-pink); color: #fff; border: none; border-radius: 12px; font-weight: 900; font-size: 1rem; cursor: pointer; }

        /* [복구] 사용법 & 통계 & 랭킹 테이블 */
        .manual-container { width: 94%; margin-top: 10px; display: flex; flex-direction: column; gap: 15px; }
        .manual-card { background: var(--card); border: 1px solid #333; border-radius: 15px; padding: 20px; }
        .manual-formula { background: #000; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 0.7rem; color: var(--accent); margin: 10px 0; text-align: center; border: 1px solid #222; }

        .digital-stats { width: 92%; background: #000; border: 1px solid #333; padding: 15px; border-radius: 12px; margin-top: 10px; }
        .stat-bar-bg { width: 100%; height: 8px; background: #111; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        .stat-bar-fill { height: 100%; width: 0%; transition: width 1s ease-out; }

        .log-table { width: 95%; border-collapse: collapse; font-size: 0.7rem; background: rgba(0,0,0,0.4); border-radius: 10px; overflow: hidden; margin: 20px auto; flex-shrink: 0; }
        .log-table th { background: #1a1a1a; padding: 10px; color: var(--text-muted); font-size: 0.75rem; font-weight: 900; }
        .log-table td { padding: 8px; border-bottom: 1px solid #222; text-align: center; font-weight: 700; }

        nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; height: 75px; background: var(--nav-bg); display: flex; border-top: 1px solid #222; z-index: 200; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .btn-create-floating { position: fixed; bottom: 100px; right: 20px; width: 60px; height: 60px; background: var(--blue); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; box-shadow: 0 0 15px var(--blue); border: 2px solid #fff; cursor: pointer; z-index: 300; }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>

<script>
    const tg = window.Telegram.WebApp; tg.expand();
    let currentLang = localStorage.getItem('db_wheel_lang') || null; 
    let currentId = "GUEST", balance = 50.0;
    let isSpinning = false, myBet = null, globalHistory = [], myGameStats = { total: 0, wins: 0 };
    let battlePlayers = 2, selectedBattleColor = 'black', pvpRooms = [], myBattleRoom = null;
    const masterColors = { black: '#444444', red: '#ff3333', blue: '#00d9ff', gold: '#ffcc00' };

    const CYCLE_MS = 20000, SPIN_DURATION = 4500, RESULT_WAIT = 500, CLOSE_DURATION = 1000;
    const FREEZE_PERIOD = SPIN_DURATION + RESULT_WAIT + CLOSE_DURATION;
    const BETTING_PERIOD = CYCLE_MS - FREEZE_PERIOD;

    const sectors = [{color:'#ffcc00', name:'gold', mult:50, weight: 1},{color:'#00d9ff', name:'blue', mult:5, weight: 10},{color:'#ff3333', name:'red', mult:3, weight: 17},{color:'#444444', name:'black', mult:2, weight: 28}];
    const wheelMap = []; sectors.forEach(s => { for(let i=0; i<s.weight; i++) wheelMap.push(s); });
    function shuffleWheel() { const seed = 123; for (let i = wheelMap.length - 1; i > 0; i--) { const j = (seed * (i + 1)) % wheelMap.length; [wheelMap[i], wheelMap[j]] = [wheelMap[j], wheelMap[i]]; } }
    shuffleWheel();

    function setLanguage(lang) { currentLang = lang; localStorage.setItem('db_wheel_lang', lang); document.getElementById('langOverlay').style.display = 'none'; applyI18n(); }
    function applyI18n() {
        const t = (currentLang === 'ko') ? { how: "증명 가능한 공정성", rule: "UTC 타임스탬프 기반 연산" } : { how: "Provably Fair", rule: "UTC-based Algorithm" };
        document.getElementById('howContent').innerHTML = `<div class="manual-card"><h4>💎 ${t.how}</h4><div class="manual-formula">Result = (UTC_Timestamp * 9301 + 49297) % 233280</div><p>${t.rule}</p></div>`;
    }

    /* --- [복구/고도화] 배틀 아레나 로직 --- */
    function renderBattleLobby() {
        const area = document.getElementById('roomListArea'); area.innerHTML = '';
        const roomCount = Math.floor(Math.random() * 5) + 2; 
        pvpRooms = []; const colorKeys = ['black', 'red', 'blue', 'gold'];
        for(let i=0; i<roomCount; i++) {
            const players = [2, 3, 4][Math.floor(Math.random()*3)];
            const bet = [0.1, 0.5, 1, 5][Math.floor(Math.random()*4)];
            const current = Math.floor(Math.random() * players);
            let grad = `conic-gradient(`;
            for(let j=0; j<players; j++) grad += `${masterColors[colorKeys[j]]} ${j*(360/players)}deg ${(j+1)*(360/players)}deg,`;
            grad = grad.slice(0,-1) + `)`;
            pvpRooms.push({ id: 'R_'+Math.floor(Math.random()*999), players, current, bet });
            area.innerHTML += `<div class="room-card" onclick="joinBattle('${pvpRooms[i].id}')"><div class="room-mini-wheel" style="background:${grad}">${players}P</div><div class="room-status">${current}/${players} 대기 중</div><div class="room-title">${bet} TON</div></div>`;
        }
    }

    function setBattlePlayers(n) { battlePlayers = n; document.querySelectorAll('.selector-card').forEach(c => c.classList.remove('active')); document.getElementById('bp'+n).classList.add('active'); renderColorButtons(n); }
    function renderColorButtons(n) {
        const area = document.getElementById('battleColorArea'); area.innerHTML = '';
        const colors = ['black', 'red', 'blue', 'gold'];
        colors.slice(0, n).forEach(c => {
            const btn = document.createElement('div'); btn.className = `color-btn ${selectedBattleColor === c ? 'active' : ''} btn-${c}`;
            btn.style.border = `1.5px solid ${masterColors[c]}`; btn.innerText = c.toUpperCase();
            btn.onclick = () => { selectedBattleColor = c; renderColorButtons(n); }; area.appendChild(btn);
        });
    }

    function joinBattle(roomId) {
        const room = pvpRooms.find(r => r.id === roomId); if(!room || balance < room.bet) return;
        balance -= room.bet; updateBalUI();
        myBattleRoom = { participants: [{id: 'me', color: 'black', isMe: true}], total: room.bet * room.players, players: room.players };
        const colors = ['black', 'red', 'blue', 'gold'];
        for(let i=1; i<room.players; i++) myBattleRoom.participants.push({id: 'Bot'+i, color: colors[i], isMe: false});
        showPvPView();
    }

    function confirmCreateBattle() {
        const val = parseFloat(document.getElementById('battleBetInput').value); if(val > balance) return;
        balance -= val; updateBalUI(); closeModal();
        myBattleRoom = { participants: [{id: 'me', color: selectedBattleColor, isMe: true}], total: val * battlePlayers, players: battlePlayers };
        const colors = ['black', 'red', 'blue', 'gold'];
        let cIdx = 0; while(myBattleRoom.participants.length < battlePlayers) {
            let tc = colors[cIdx++]; if(tc !== selectedBattleColor) myBattleRoom.participants.push({id: 'Bot'+cIdx, color: tc, isMe: false});
        }
        showPvPView();
    }

    function showPvPView() {
        document.getElementById('battleLobby').style.display = 'none'; document.getElementById('pvpBattleView').style.display = 'flex';
        document.getElementById('pvpTotalPot').innerText = myBattleRoom.total.toFixed(1) + " TON";
        drawPvPWheel(); renderPvPAvatars();
        document.getElementById('pvpStatusTxt').innerText = "매칭 완료! 3초 후 시작...";
        setTimeout(startPvPSpin, 3000);
    }

    function drawPvPWheel() {
        const canvas = document.getElementById('pvpWheelCanvas'); const ctx = canvas.getContext('2d');
        const n = myBattleRoom.players; const arc = (Math.PI * 2) / n;
        const colors = ['black', 'red', 'blue', 'gold'];
        ctx.clearRect(0,0,560,560);
        for(let i=0; i<n; i++) {
            ctx.beginPath(); ctx.fillStyle = masterColors[colors[i]]; ctx.moveTo(280, 280);
            ctx.arc(280, 280, 260, i*arc - Math.PI/2, (i+1)*arc - Math.PI/2); ctx.fill();
        }
        ctx.beginPath(); ctx.fillStyle = '#1e2128'; ctx.arc(280, 280, 60, 0, Math.PI*2); ctx.fill();
    }

    function renderPvPAvatars() {
        const layer = document.getElementById('pvpAvatarLayer'); layer.innerHTML = '';
        const n = myBattleRoom.players; const arc = 360 / n;
        myBattleRoom.participants.forEach((p, i) => {
            const avatar = document.createElement('div'); avatar.className = 'pvp-user-avatar';
            avatar.innerText = p.id.toUpperCase();
            const angle = (i * arc + arc/2 - 90) * (Math.PI / 180);
            avatar.style.left = (140 + Math.cos(angle) * 160 - 22) + 'px';
            avatar.style.top = (140 + Math.sin(angle) * 160 - 22) + 'px';
            layer.appendChild(avatar);
        });
    }

    function startPvPSpin() {
        const canvas = document.getElementById('pvpWheelCanvas'); const layer = document.getElementById('pvpAvatarLayer');
        const winnerIdx = Math.floor(Math.random() * myBattleRoom.players);
        const targetRotation = 360 * 10 + (360 - (winnerIdx * (360 / myBattleRoom.players) + (180 / myBattleRoom.players)));
        canvas.style.transition = layer.style.transition = 'transform 4.5s cubic-bezier(0.1, 0, 0, 1)';
        canvas.style.transform = layer.style.transform = `rotate(${targetRotation}deg)`;
        setTimeout(() => {
            if(myBattleRoom.participants[winnerIdx].isMe) { balance += myBattleRoom.total; alert("승리! " + myBattleRoom.total.toFixed(1) + " TON 획득!"); }
            updateBalUI(); leaveBattle();
        }, 5000);
    }

    function leaveBattle() { document.getElementById('pvpBattleView').style.display = 'none'; document.getElementById('battleLobby').style.display = 'flex'; renderBattleLobby(); }

    /* --- [복구] 랭킹 50위 로직 --- */
    function renderRanking() {
        const tbody = document.getElementById('rankingBody'); tbody.innerHTML = '';
        for(let i=1; i<=50; i++) {
            tbody.innerHTML += `<tr><td>${i}</td><td>User${i}**</td><td>${(1000-i*10)}T</td><td>${(500-i*5)}T</td><td>${(60-i*0.5).toFixed(1)}%</td></tr>`;
        }
    }

    /* --- [복구] 코어 엔진 --- */
    function tick() {
        const el = Date.now() % CYCLE_MS; const p = document.getElementById('wheelPointer');
        if (el < FREEZE_PERIOD) {
            document.getElementById('timerBar').style.width = "0%";
            document.getElementById('betOverlay').style.display = "flex";
            if (el >= CLOSE_DURATION && el < CLOSE_DURATION + 200 && !isSpinning) startSpin();
        } else {
            isSpinning = false; const rem = CYCLE_MS - el;
            document.getElementById('timerBar').style.width = (rem / BETTING_PERIOD) * 100 + "%";
            document.getElementById('betOverlay').style.display = "none";
        }
    }

    function startSpin() {
        isSpinning = true; const s = Math.floor(Date.now() / CYCLE_MS);
        const winIdx = (s * 9301 + 49297) % 233280 % 56;
        const target = 360 * 10 + (360 - (winIdx * (360/56)));
        document.getElementById('wheelCanvas').style.transition = `transform ${SPIN_DURATION}ms cubic-bezier(0.1, 0, 0, 1)`;
        document.getElementById('wheelCanvas').style.transform = `rotate(${target}deg)`;
        setTimeout(() => {
            const win = wheelMap[winIdx]; globalHistory.push(win.color); updateHistoryUI();
            if(myBet && myBet.type === win.name) balance += (myBet.amount * win.mult);
            myBet = null; updateBalUI();
        }, SPIN_DURATION);
    }

    function handleUserBet(type) { if(Date.now()%CYCLE_MS < FREEZE_PERIOD || myBet) return; myBet = { type, amount: parseFloat(document.getElementById('betInput').value) }; balance -= myBet.amount; updateBalUI(); }
    function updateBalUI() { document.getElementById('balance').innerText = balance.toFixed(1); }
    function switchTab(id, el) {
        document.querySelectorAll('.content-view').forEach(v => v.classList.remove('active')); document.getElementById('view-' + id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); if(el) el.classList.add('active');
        if(id === 'battle') renderBattleLobby(); if(id === 'ranking') renderRanking(); applyI18n();
    }
    function updateHistoryUI() {
        const s = document.getElementById('historyStrip'); s.innerHTML = '';
        globalHistory.slice(-35).reverse().forEach(c => { s.innerHTML += `<div class="hist-bar" style="background-color:${c}"></div>`; });
    }
    function initAudio() { if(!currentLang) document.getElementById('langOverlay').style.display = 'flex'; }
    function closeModal() { document.getElementById('createModal').style.display = 'none'; }
    function openCreateModal() { document.getElementById('createModal').style.display = 'flex'; setBattlePlayers(2); }

    const ctx = document.getElementById('wheelCanvas').getContext('2d');
    function drawWheel() { const arc = (Math.PI * 2) / 56; for (let i = 0; i < 56; i++) { ctx.beginPath(); ctx.strokeStyle = wheelMap[i].color; ctx.lineWidth = 14; ctx.arc(280, 280, 260, i * arc, (i + 1) * arc); ctx.stroke(); } }
    
    drawWheel(); setInterval(tick, 100);
</script>
</body>
</html>
