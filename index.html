<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spin4 v5.70 Ultimate GM (Fixed Sync)</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-top: #1e2128; --bg-bottom: #0e1013;
            --card: #1a1d23; --accent: #00f2ff;
            --gold: #ffcc00; --blue: #00e5ff;
            --red: #ff3333; --black: #444444; 
            --text-muted: #8899aa; --nav-bg: #16191e;
            --point-color: #ff9500; --buy-color: #ff00ff;
            --crypto-color: #007aff;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100dvh; overflow: hidden; touch-action: manipulation; background: radial-gradient(circle at center, var(--bg-top) 0%, var(--bg-bottom) 100%); color: white; font-family: 'Pretendard', sans-serif; }
        .main-container { width: 100%; max-width: 500px; height: 100%; margin: 0 auto; display: flex; flex-direction: column; position: relative; overflow: hidden; }

        /* 언어 선택 오버레이 */
        #langOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .lang-list { display: flex; flex-direction: column; gap: 12px; width: 220px; }
        .lang-btn { background: rgba(0, 0, 0, 0.7); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; padding: 15px 25px; border-radius: 12px; font-size: 0.95rem; font-weight: 700; display: flex; align-items: center; gap: 15px; cursor: pointer; }

        header { padding: 12px 18px; background: rgba(0,0,0,0.4); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .user-id { font-size: 0.8rem; font-weight: 700; border-left: 3px solid var(--accent); padding-left: 10px; }
        .balance-box { background: rgba(255, 149, 0, 0.05); padding: 5px 10px; border-radius: 6px; border: 1px solid var(--point-color); color: var(--point-color); font-weight: 800; font-size: 0.85rem; }

        .rolls-wrapper { width: 100%; padding: 15px 0; background: rgba(0,0,0,0.2); border-bottom: 1px solid #333; flex-shrink: 0; display: flex; justify-content: center; }
        .history-strip { display: flex; gap: 4px; height: 45px; align-items: flex-end; overflow: hidden; }
        .hist-bar { width: 4px; border-radius: 10px; flex-shrink: 0; transition: all 0.3s ease; }
        .hist-bar.h-black { height: 18px; opacity: 0.6; }
        .hist-bar.h-red { height: 26px; opacity: 0.8; }
        .hist-bar.h-blue { height: 34px; opacity: 0.9; }
        .hist-bar.h-gold { height: 42px; box-shadow: 0 0 12px var(--gold); z-index: 5; }

        .timer-container { width: 100%; height: 6px; background: #000; position: relative; flex-shrink: 0; }
        #timerBar { position: absolute; left: 0; top: 0; height: 100%; width: 0%; transition: width 0.1s linear; }

        .content-view { flex: 1; overflow-y: auto; display: none; padding-bottom: 90px; width: 100%; align-items: center; }
        .content-view.active { display: flex; flex-direction: column; }

        .wheel-section { position: relative; margin: 25px 0; width: 230px; height: 230px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        #wheelCanvas { width: 100%; height: 100%; border-radius: 50%; }
        .wheel-logo { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; font-weight: 900; font-size: 1.8rem; color: var(--accent); text-shadow: 0 0 10px var(--accent); pointer-events: none; }
        .pointer { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); width: 16px; height: 24px; background: #fff; clip-path: polygon(0 0, 100% 0, 50% 100%); z-index: 25; transition: background-color 0.05s linear; box-shadow: 0 0 10px rgba(0,0,0,0.5); }

        .overlay-container { width: 100%; padding: 0 15px; position: relative; }
        .controls { width: 100%; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #333; }
        #betInput { flex: 1; background: #000; border: 1px solid #333; color: var(--accent); padding: 12px; border-radius: 8px; text-align: center; font-weight: 900; width: 100%; outline: none; }
        .bet-buttons { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 12px; }
        .btn { height: 60px; border: none; border-radius: 8px; font-weight: 900; font-size: 1.1rem; color: #fff; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; }
        .btn-black { background: var(--black); border: 1.5px solid #555; }
        .btn-red { background: var(--red); }
        .btn-blue { background: var(--blue); color: #000; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn.selected { border: 2px solid #fff; transform: scale(0.98); }

        .live-betting-area { width: 100%; margin-top: 15px; padding: 10px; background: rgba(255,255,255,0.02); border-radius: 12px; border: 1px solid #333; }
        .live-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .live-col { background: rgba(0,0,0,0.4); border-radius: 8px; min-height: 110px; border-top: 3px solid #444; overflow: hidden; display: flex; flex-direction: column; }
        .col-head { padding: 4px; text-align: center; font-size: 0.55rem; font-weight: 900; color: var(--text-muted); }
        .col-total { font-size: 0.62rem; font-weight: 800; color: var(--accent); display: block; }
        .bet-list { padding: 3px; flex: 1; display: flex; flex-direction: column; gap: 3px; }
        .bet-item { display: flex; justify-content: space-between; font-size: 0.48rem; font-weight: 700; background: rgba(255,255,255,0.05); padding: 2px; border-radius: 2px; }

        .log-table { width: 95%; border-collapse: collapse; font-size: 0.7rem; background: rgba(0,0,0,0.4); border-radius: 10px; overflow: hidden; margin: 20px auto; }
        .log-table th { background: #1a1a1a; padding: 10px; color: var(--text-muted); font-size: 0.75rem; }
        .log-table td { padding: 8px; border-bottom: 1px solid #222; text-align: center; font-weight: 700; }
        .win-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; }

        nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; height: 75px; background: var(--nav-bg); display: flex; border-top: 1px solid #222; z-index: 200; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); cursor: pointer; }
        .nav-item span { font-size: 0.75rem; font-weight: 700; margin-top: 2px; }
        .nav-item.active { color: var(--accent); }

        .closed-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75); z-index: 100; display: none; align-items: center; justify-content: center; border-radius: 12px; }
        .closed-text { color: #ddd; font-weight: 900; font-size: 1.8rem; letter-spacing: 5px; animation: pulse 0.8s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        .digital-stats { width: 94%; background: #000; border: 1px solid #333; padding: 15px; border-radius: 12px; margin-top: 10px; }
        .stat-bar-bg { width: 100%; height: 8px; background: #111; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        .version-tag { font-size: 0.6rem; color: #444; text-align: center; padding: 10px; margin-top: 10px; width: 100%; }
    </style>
</head>
<body onclick="initAudio()">

<div id="langOverlay">
    <h3 id="langSelTitle" style="color:var(--accent); font-weight:900; margin-bottom:25px;">SELECT LANGUAGE</h3>
    <div class="lang-list">
        <div class="lang-btn" onclick="setLanguage('en')">🇺🇸 English</div>
        <div class="lang-btn" onclick="setLanguage('cn')">🇨🇳 简体中文</div>
        <div class="lang-btn" onclick="setLanguage('jp')">🇯🇵 日本語</div>
        <div class="lang-btn" onclick="setLanguage('ko')">🇰🇷 한국어</div>
    </div>
</div>

<div class="main-container">
    <header>
        <div class="user-id" id="displayId">Welcome Guest</div>
        <div style="display:flex; gap:8px; align-items:center;">
            <button id="soundToggle" onclick="toggleMute()" style="background:none; border:none; font-size:1.1rem; color:#fff; cursor:pointer;">🔊</button>
            <div class="balance-box"><span id="balance">1,000,000</span> P</div>
            <button id="btnBuyTop" style="background:var(--buy-color); color:#fff; border:none; padding:4px 8px; border-radius:4px; font-weight:800; font-size:0.7rem;">BUY</button>
        </div>
    </header>

    <div class="rolls-wrapper"><div id="historyStrip" class="history-strip"></div></div>
    <div class="timer-container"><div id="timerBar"></div></div>

    <div id="view-home" class="content-view active">
        <div class="wheel-section">
            <div class="pointer" id="wheelPointer"></div>
            <div class="wheel-logo">Spin4</div>
            <canvas id="wheelCanvas" width="560" height="560"></canvas>
        </div>
        <div class="overlay-container">
            <div id="betOverlay" class="closed-overlay"><div id="closedTxt" class="closed-text">CLOSED</div></div>
            <div class="controls">
                <div style="display:flex; gap:8px; align-items:center;">
                    <input type="number" id="betInput" value="10000">
                    <div style="display:flex; flex-direction:column; gap:2px;">
                        <button onclick="adjBet(10000)" style="width:40px; height:24px; background:#333; border:none; color:#fff; border-radius:4px; font-weight:bold;">+</button>
                        <button onclick="adjBet(-10000)" style="width:40px; height:24px; background:#333; border:none; color:#fff; border-radius:4px; font-weight:bold;">-</button>
                    </div>
                </div>
                <div class="bet-buttons">
                    <button class="btn btn-black" onclick="handleUserBet('black')" id="btnBlack">2×</button>
                    <button class="btn btn-red" onclick="handleUserBet('red')" id="btnRed">3×</button>
                    <button class="btn btn-blue" onclick="handleUserBet('blue')" id="btnBlue">5×</button>
                    <button class="btn btn-gold" onclick="handleUserBet('gold')" id="btnGold">50×</button>
                </div>
            </div>
            <div class="live-betting-area">
                <div id="liveTitle" style="font-size:0.7rem; color:#8899aa; margin-bottom:8px; font-weight:900; text-align:center;">LIVE STATUS</div>
                <div class="live-grid">
                    <div class="live-col" style="border-top-color:var(--black);"><div class="col-head"><span id="cl1">BLACK</span><span id="t-black" class="col-total">0</span></div><div id="l-black" class="bet-list"></div></div>
                    <div class="live-col" style="border-top-color:var(--red);"><div class="col-head"><span id="cl2">RED</span><span id="t-red" class="col-total">0</span></div><div id="l-red" class="bet-list"></div></div>
                    <div class="live-col" style="border-top-color:var(--blue);"><div class="col-head"><span id="cl3">BLUE</span><span id="t-blue" class="col-total">0</span></div><div id="l-blue" class="bet-list"></div></div>
                    <div class="live-col" style="border-top-color:var(--gold);"><div class="col-head"><span id="cl4">GOLD</span><span id="t-gold" class="col-total">0</span></div><div id="l-gold" class="bet-list"></div></div>
                </div>
            </div>
        </div>
        <table class="log-table">
            <thead><tr><th>Pick</th><th>Bet</th><th>Result</th><th>Winner</th></tr></thead>
            <tbody id="myLogBody"></tbody>
        </table>
    </div>

    <div id="view-recommend" class="content-view">
        <div style="padding:30px 20px 10px; text-align:center;"><div style="font-size:0.85rem; font-weight:900; color:var(--accent);" id="lblLast100Stats">DIGITAL ANALYSIS</div></div>
        <div id="statsContainer" class="digital-stats"></div>
        <div class="version-tag">[통계] v5.70 Ultimate GM (Sync Fixed)</div>
    </div>

    <div id="view-wallet" class="content-view">...WALLET...</div>
    <div id="view-ranking" class="content-view">...RANKING...</div>
    <div id="view-how" class="content-view">...HOW TO...</div>
    <div id="view-login" class="content-view">...LOGIN...</div>

    <nav>
        <div class="nav-item active" onclick="switchTab('home', this)"><div class="nav-icon">🏠</div><span id="navHome">홈</span></div>
        <div class="nav-item" onclick="switchTab('wallet', this)"><div class="nav-icon">👛</div><span id="navWallet">지갑</span></div>
        <div class="nav-item" onclick="switchTab('ranking', this)"><div class="nav-icon">🏆</div><span id="navRank">랭킹</span></div>
        <div class="nav-item" onclick="switchTab('how', this)"><div class="nav-icon">❓</div><span id="navHow">사용법</span></div>
        <div class="nav-item" onclick="switchTab('recommend', this)"><div class="nav-icon">📈</div><span id="navStats">통계</span></div>
        <div class="nav-item" onclick="switchTab('login', this)"><div class="nav-icon">👤</div><span id="navLogin">로그인</span></div>
    </nav>
</div>

<script>
    const tg = window.Telegram.WebApp; tg.expand();
    let currentLang = 'en', currentId = "GUEST", balance = 1000000;
    let isSpinning = false, myBet = null, globalHistory = [], lastResultColor = "#fff";
    let currentAbsoluteRotation = 0, isMuted = false;

    // v5.49 GM 가중치 고정
    const sectors = [
        {color:'#ffcc00', name:'gold', mult:50, weight: 1},
        {color:'#00e5ff', name:'blue', mult:5, weight: 10},
        {color:'#ff3333', name:'red', mult:3, weight: 17},
        {color:'#444444', name:'black', mult:2, weight: 28}
    ];
    const wheelMap = []; sectors.forEach(s => { for(let i=0; i<s.weight; i++) wheelMap.push(s); });
    function shuffleWheel() { 
        const seed = 123; 
        for (let i = wheelMap.length - 1; i > 0; i--) { 
            const j = (seed * (i + 1)) % wheelMap.length; 
            [wheelMap[i], wheelMap[j]] = [wheelMap[j], wheelMap[i]]; 
        } 
    }
    shuffleWheel();

    const CYCLE_MS = 20000, SPIN_DURATION = 6500, RESULT_WAIT = 2000, FREEZE_PERIOD = SPIN_DURATION + RESULT_WAIT, BETTING_PERIOD = CYCLE_MS - FREEZE_PERIOD;
    const canvas = document.getElementById('wheelCanvas'), ctx = canvas.getContext('2d'), timerBar = document.getElementById('timerBar'), betOverlay = document.getElementById('betOverlay');

    // [v5.49] 90도(3시 방향) 시작 고정
    function drawWheel() {
        const arc = (Math.PI * 2) / 56, radius = 260; 
        ctx.clearRect(0,0,560,560); ctx.lineWidth = 14; 
        for (let i = 0; i < 56; i++) {
            ctx.beginPath(); ctx.strokeStyle = wheelMap[i].color;
            ctx.arc(280, 280, radius, i * arc + Math.PI/2 + 0.02, (i + 1) * arc + Math.PI/2 - 0.02); 
            ctx.stroke();
        }
    }

    function tick() {
        const now = Date.now(), elapsed = now % CYCLE_MS, pointer = document.getElementById('wheelPointer');
        const arc = 360 / 56;
        
        if (elapsed < FREEZE_PERIOD) {
            timerBar.style.width = "0%"; betOverlay.style.display = "flex";
            if (elapsed < 200 && !isSpinning) startSpin();
            
            // [실시간 눈동기화] 현재 회전각을 기반으로 6시 방향(180도)에 위치한 인덱스 계산
            const rot = getCurrentRotation();
            // 공식: (180도 - (현재회전각 + 90도 오프셋)) -> 56분할
            const currentIdx = Math.floor(((180 - (rot % 360) - 90 + 720) % 360) / arc) % 56;
            pointer.style.backgroundColor = wheelMap[currentIdx].color;
        } else {
            isSpinning = false; const rem = CYCLE_MS - elapsed;
            timerBar.style.width = (rem / BETTING_PERIOD) * 100 + "%";
            timerBar.style.backgroundColor = `hsl(${(rem / BETTING_PERIOD) * 60}, 100%, 50%)`;
            betOverlay.style.display = (rem < 1000) ? "flex" : "none";
            pointer.style.backgroundColor = lastResultColor;
        }
    }

    function getCurrentRotation() { 
        const st = window.getComputedStyle(canvas, null), tr = st.getPropertyValue("transform"); 
        if(tr === "none") return 0; 
        const v = tr.split('(')[1].split(')')[0].split(','); 
        return (Math.round(Math.atan2(parseFloat(v[1]), parseFloat(v[0])) * (180/Math.PI)) + 360) % 360; 
    }

    // [Fixed Sync] 정밀 타겟팅 로직
    function startSpin() {
        isSpinning = true;
        const res = getWinIndex(Math.floor(Date.now() / CYCLE_MS));
        const arc = 360 / 56;
        
        // 1. 타겟 인덱스의 중심 각도 (90도 시작 기준)
        const sectorCenter = (res.index * arc) + (arc / 2);
        // 2. 6시(180도)에 멈추기 위한 필요 회전량 계산 (90도 오프셋 고려)
        const targetDeg = (180 - (sectorCenter + 90) + 720) % 360;
        
        const currentMod = currentAbsoluteRotation % 360;
        let distance = (targetDeg - currentMod + 360) % 360;
        
        // 최소 10바퀴 이상 회전
        currentAbsoluteRotation += distance + (360 * 10);
        
        canvas.style.transition = `transform ${SPIN_DURATION}ms cubic-bezier(0.15, 0, 0.1, 1)`;
        canvas.style.transform = `rotate(${currentAbsoluteRotation}deg)`;
        
        setTimeout(() => {
            const finalRot = getCurrentRotation();
            const finalIdx = Math.floor(((180 - (finalRot % 360) - 90 + 720) % 360) / arc) % 56;
            resolve(wheelMap[finalIdx]);
        }, SPIN_DURATION);
    }

    function resolve(win) {
        lastResultColor = win.color;
        globalHistory.push(win.color);
        if(myBet) {
            const winStatus = myBet.type === win.name;
            if(winStatus) balance += (myBet.amount * win.mult);
            const row = `<tr><td><span style="color:var(--${myBet.type})">${myBet.type.toUpperCase()}</span></td><td>${myBet.amount.toLocaleString()}</td><td style="color:${winStatus?'var(--accent)':'var(--red)'}">${winStatus ? 'WIN' : 'LOSE'}</td><td><span class="win-dot" style="background:${win.color}"></span></td></tr>`;
            document.getElementById('myLogBody').insertAdjacentHTML('afterbegin', row);
        }
        updateHistoryUI();
        setTimeout(() => { 
            myBet = null; 
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('selected'));
            updateBalUI(); 
        }, RESULT_WAIT);
    }

    function getWinIndex(seed) { const rv = (seed * 9301 + 49297) % 233280; return { index: (rv % 56) }; }
    function updateBalUI() { document.getElementById('balance').innerText = balance.toLocaleString(); }
    function adjBet(v) { let input = document.getElementById('betInput'), n = parseInt(input.value) + v; if(n >= 10000) input.value = n; }
    function handleUserBet(type) {
        const el = Date.now() % CYCLE_MS;
        if(el < FREEZE_PERIOD || el > CYCLE_MS - 1000 || myBet) return;
        const amt = parseInt(document.getElementById('betInput').value);
        if(amt > balance || amt < 10000) return;
        balance -= amt; updateBalUI();
        myBet = { type, amount: amt };
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('selected'));
        document.getElementById('btn' + type.charAt(0).toUpperCase() + type.slice(1)).classList.add('selected');
    }

    function updateHistoryUI() {
        const strip = document.getElementById('historyStrip'); strip.innerHTML = '';
        [...globalHistory].slice(-55).reverse().forEach(color => {
            const bar = document.createElement('div');
            let hClass = 'h-black'; 
            if(color === '#ff3333') hClass = 'h-red'; else if(color === '#00e5ff') hClass = 'h-blue'; else if(color === '#ffcc00') hClass = 'h-gold';
            bar.className = 'hist-bar ' + hClass; bar.style.backgroundColor = color; strip.appendChild(bar);
        });
    }

    function renderStats() {
        const counts = { black: 0, red: 0, blue: 0, gold: 0 };
        globalHistory.slice(-100).forEach(color => { 
            if(color === '#444444') counts.black++; else if(color === '#ff3333') counts.red++; else if(color === '#00e5ff') counts.blue++; else if(color === '#ffcc00') counts.gold++; 
        });
        const container = document.getElementById('statsContainer'); container.innerHTML = '';
        ['black', 'red', 'blue', 'gold'].forEach(c => {
            const pct = counts[c]; 
            container.innerHTML += `<div class="stat-row" style="margin-bottom:12px;"><div style="display:flex; justify-content:space-between; font-size:0.7rem;"><span>${c.toUpperCase()}</span><span>${pct}%</span></div><div class="stat-bar-bg"><div style="height:100%; width:${pct}%; transition:width 1s; background:var(--${c})"></div></div></div>`;
        });
    }

    function switchTab(id, el) { 
        document.querySelectorAll('.content-view').forEach(v => v.classList.remove('active')); 
        document.getElementById('view-' + id).classList.add('active'); 
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); 
        el.classList.add('active'); if(id === 'recommend') renderStats(); 
    }

    function setLanguage(lang) { currentLang = lang; document.getElementById('langOverlay').style.display = 'none'; }
    function initAudio() {}
    function toggleMute() { isMuted = !isMuted; document.getElementById('soundToggle').innerText = isMuted ? "🔇" : "🔊"; }

    drawWheel();
    updateBalUI();
    setInterval(tick, 50);
</script>
</body>
</html>
