<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DetaBridge Wheel Pro v5.7</title>
    <style>
        :root {
            --bg-top: #1e2128; --bg-bottom: #0e1013;
            --card: #1a1d23; --accent: #00f2ff;
            --gold: #ffcc00; --blue: #00e5ff;
            --red: #ff3333; --black: #222222;
            --text-muted: #8899aa; --nav-bg: #16191e;
            --point-color: #ff9500; --buy-color: #ff00ff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100dvh; 
            overflow: hidden; touch-action: manipulation;
            background: radial-gradient(circle at center, var(--bg-top) 0%, var(--bg-bottom) 100%);
            color: white; font-family: 'Pretendard', sans-serif;
        }

        .main-container { width: 100%; max-width: 500px; height: 100%; margin: 0 auto; display: flex; flex-direction: column; position: relative; overflow-x: hidden; }

        /* 언어 선택 오버레이 */
        #langOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }
        .lang-list { display: flex; flex-direction: column; gap: 12px; width: 220px; }
        .lang-btn { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; 
            padding: 15px 20px; border-radius: 12px; font-size: 0.9rem; font-weight: 700;
            display: flex; align-items: center; justify-content: flex-start; gap: 15px; cursor: pointer;
        }

        header { padding: 12px 18px; background: rgba(0,0,0,0.4); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .user-id { font-size: 0.8rem; font-weight: 700; border-left: 3px solid var(--accent); padding-left: 10px; }
        .balance-box { background: rgba(255, 149, 0, 0.05); padding: 5px 10px; border-radius: 6px; border: 1px solid var(--point-color); color: var(--point-color); font-weight: 800; font-size: 0.85rem; }

        /* 타이머 & 히스토리 (v5.4/v5.5 유지) */
        .timer-container { width: 100%; height: 6px; background: #000; position: relative; }
        #timerBar { position: absolute; left: 0; top: 0; height: 100%; width: 0%; transition: width 0.1s linear; }
        .history-strip { display: flex; gap: 5px; padding: 10px 0; height: 24px; width: 100%; justify-content: center; background: rgba(0,0,0,0.2); flex-shrink: 0; box-sizing: content-box; }
        .hist-bar { width: 8px; height: 100%; border-radius: 1px; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.05); }

        .content-view { flex: 1; overflow-y: auto; display: none; padding-bottom: 90px; width: 100%; }
        .content-view.active { display: flex; flex-direction: column; align-items: center; }

        /* 휠 섹션 (v5.5 포인터 고정) */
        .wheel-section { position: relative; margin: 20px 0; width: 240px; height: 240px; flex-shrink: 0; }
        #wheelCanvas { width: 100%; height: 100%; border-radius: 50%; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .wheel-logo { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; font-weight: 900; font-size: 2rem; text-shadow: 0 0 15px var(--accent); }
        .pointer { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); width: 14px; height: 22px; background: #fff; clip-path: polygon(0 0, 100% 0, 50% 100%); z-index: 20; filter: drop-shadow(0 0 8px var(--accent)); }

        /* 배팅 컨트롤 (v5.6 언어동기화 + v5.5 배당표시) */
        .overlay-container { position: relative; width: 95%; margin: 10px auto 0; }
        .controls { width: 100%; background: var(--card); padding: 12px; border-radius: 12px; }
        .bet-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .btn { height: 55px; border: none; border-radius: 8px; font-weight: 900; font-size: 0.85rem; color: #fff; cursor: pointer; transition: transform 0.1s; }
        .btn:active { transform: scale(0.95); }
        .btn-black { background: var(--black); } .btn-red { background: var(--red); } .btn-blue { background: var(--blue); color: #000; } .btn-gold { background: var(--gold); color: #000; }

        .closed-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); border-radius: 12px; z-index: 50; display: none; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .closed-text { color: #ddd; font-weight: 900; font-size: 1.8rem; letter-spacing: 5px; animation: pulse 0.8s infinite; }

        /* 라이브 배팅 보드 */
        .live-betting-area { width: 100%; margin-top: 12px; padding: 10px; background: rgba(255,255,255,0.02); border-radius: 12px; }
        .live-feed { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
        .live-col { background: rgba(0,0,0,0.4); border-radius: 6px; min-height: 110px; border-top: 2px solid #444; }
        .col-head { padding: 5px 0; font-size: 0.5rem; text-align: center; font-weight: 900; line-height: 1.2; }
        .bet-list { padding: 3px; display: flex; flex-direction: column; gap: 2px; height: 80px; overflow: hidden; }
        .bet-item { display: flex; justify-content: space-between; font-size: 0.4rem; background: rgba(255,255,255,0.05); padding: 2px; animation: fadeIn 0.3s ease; }

        /* 하단 내비게이션 (v5.4/v5.6 검수 완료) */
        nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; height: 80px; background: var(--nav-bg); display: flex; border-top: 1px solid #222; z-index: 200; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); cursor: pointer; }
        .nav-item .nav-icon { font-size: 1.5rem; margin-bottom: 4px; }
        .nav-item span { font-size: 0.85rem; font-weight: 700; }
        .nav-item.active { color: var(--accent); }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 95%; margin-top: 20px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #333; }

        .log-table { width: 100%; border-collapse: collapse; font-size: 0.7rem; background: rgba(0,0,0,0.4); border-radius: 10px; overflow: hidden; margin-top: 20px; }
        .log-table th { background: #1a1a1a; padding: 10px; color: var(--text-muted); }
        .log-table td { padding: 10px; border-bottom: 1px solid #222; text-align: center; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body onclick="initAudio()">

    <div id="view-how" class="content-view"><div id="howMsg" style="padding:25px; color:#ccc; line-height:1.6;">Provably Fair System v5.7 Active</div></div>
    
    <div id="view-recommend" class="content-view">
        <div class="stats-grid">
            <div class="stat-card">
                <div id="st-total" style="font-size:1.2rem; font-weight:900; color:var(--accent);">0</div><div class="lbl-total" style="font-size:0.6rem; color:var(--text-muted);">TOTAL SPINS</div>
            </div>
            <div class="stat-card">
                <div id="st-winrate" style="font-size:1.2rem; font-weight:900; color:var(--accent);">0%</div><div class="lbl-winrate" style="font-size:0.6rem; color:var(--text-muted);">WIN RATE</div>
            </div>

    <div id="view-login" class="content-view">
        <div style="width:90%; text-align:center; margin:40px auto;">
            <h3 id="loginTitle" style="color:var(--accent)">Sync Data</h3>
            <input type="text" id="loginInput" placeholder="Telegram ID" style="width:100%; padding:15px; background:#000; border:1px solid #333; color:var(--accent); border-radius:8px; margin-bottom:15px;">
            <button id="btnLogin" class="btn btn-gold" onclick="doLogin()" style="width:100%;">Login</button>

    <nav>
        <div class="nav-item active" onclick="switchTab('home', this)"><div class="nav-icon">🏠</div><span id="navHome">홈</span></div>
        <div class="nav-item" onclick="switchTab('how', this)"><div class="nav-icon">❓</div><span id="navHow">사용법</span></div>
        <div class="nav-item" onclick="switchTab('recommend', this)"><div class="nav-icon">📈</div><span id="navStats">통계</span></div>
        <div class="nav-item" onclick="switchTab('login', this)"><div class="nav-icon">👤</div><span id="navLogin">로그인</span></div>

</div>

<audio id="sndTick" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
<audio id="sndWin" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>
<audio id="sndLose" src="https://assets.mixkit.co/active_storage/sfx/2004/2004-preview.mp3"></audio>

<script>
    /* DetaBridge Wheel Pro v5.7 Golden Audit Master */
    let currentLang = 'en', currentId = "GUEST", balance = 1000000;
    let isSpinning = false, myBet = null, globalHistory = [], stats = { black: 0, red: 0, blue: 0, gold: 0 };
    let myGameStats = { total: 0, wins: 0 }, isMuted = false, audioInitialized = false, liveBoardTotals = { black:0, red:0, blue:0, gold:0 };
    
    const i18n = {
        ko: { welcome: "환영합니다", buy: "구매", closed: "마감", live: "실시간 배팅 현황", home: "홈", how: "사용법", stats: "통계", login: "로그인", pick: "선택", bet: "금액", res: "결과", win: "당첨색", howMsg: "공정 추첨 시스템 v5.7 가동 중", totalSpins: "총 라운드", winRate: "나의 승률", sync: "데이터 동기화", loginPlaceholder: "텔레그램 ID 입력", btnBlack: "BLACK x2", btnRed: "RED x3", btnBlue: "BLUE x5", btnGold: "GOLD x50" },
        en: { welcome: "Welcome", buy: "BUY", closed: "CLOSED", live: "LIVE BETTING USER", home: "Home", how: "How", stats: "Stats", login: "Login", pick: "Pick", bet: "Bet", res: "Result", win: "Winner", howMsg: "Provably Fair System v5.7 Active", totalSpins: "TOTAL SPINS", winRate: "WIN RATE", sync: "Sync Data", loginPlaceholder: "Telegram ID", btnBlack: "BLACK x2", btnRed: "RED x3", btnBlue: "BLUE x5", btnGold: "GOLD x50" },
        cn: { welcome: "欢迎", buy: "购买", closed: "已截止", live: "实时投注", home: "首页", how: "指南", stats: "统计", login: "登录", pick: "选择", bet: "赌注", res: "结果", win: "赢家", howMsg: "公平竞赛系统 v5.7 运行중", totalSpins: "总局数", winRate: "胜率", sync: "同步数据", loginPlaceholder: "输入电报 ID", btnBlack: "黑色 x2", btnRed: "红色 x3", btnBlue: "蓝色 x5", btnGold: "金色 x50" },
        jp: { welcome: "ようこそ", buy: "購入", closed: "締切", live: "ライブ状況", home: "ホーム", how: "遊び方", stats: "統計", login: "ログイン", pick: "選択", bet: "ベット", res: "結果", win: "当選者", howMsg: "公正な抽選システム v5.7 稼動中", totalSpins: "총회전수", winRate: "승률", sync: "동기화", loginPlaceholder: "ID를 입력", btnBlack: "BLACK x2", btnRed: "RED x3", btnBlue: "BLUE x5", btnGold: "GOLD x50" }
    };

    const CYCLE_MS = 20000, SPIN_DURATION = 6500, RESULT_WAIT = 2000, FREEZE_PERIOD = SPIN_DURATION + RESULT_WAIT, BETTING_PERIOD = CYCLE_MS - FREEZE_PERIOD;
    const canvas = document.getElementById('wheelCanvas'), ctx = canvas.getContext('2d'), timerBar = document.getElementById('timerBar'), betOverlay = document.getElementById('betOverlay');
    const wheelMap = []; const sectors = [{color:'#ffcc00',name:'gold',mult:50},{color:'#00e5ff',name:'blue',mult:5},{color:'#ff3333',name:'red',mult:3},{color:'#222222',name:'black',mult:2}];
    for(let i=0; i<54; i++){ if(i===0) wheelMap.push(sectors[0]); else if(i%10===0) wheelMap.push(sectors[1]); else if(i%3===0) wheelMap.push(sectors[2]); else wheelMap.push(sectors[3]); }

    function setLanguage(lang) {
        currentLang = lang; localStorage.setItem('db_wheel_lang', lang);
        document.getElementById('langOverlay').style.display = 'none'; applyI18n();
    }

    function applyI18n() {
        const t = i18n[currentLang];
        document.getElementById('displayId').innerText = `${t.welcome} ${currentId}`;
        document.getElementById('btnBuy').innerText = t.buy;
        document.getElementById('closedTxt').innerText = t.closed;
        document.getElementById('liveTitle').innerText = t.live;
        document.getElementById('navHome').innerText = t.home;
        document.getElementById('navHow').innerText = t.how;
        document.getElementById('navStats').innerText = t.stats;
        document.getElementById('navLogin').innerText = t.login;
        document.getElementById('btnBlack').innerText = t.btnBlack;
        document.getElementById('btnRed').innerText = t.btnRed;
        document.getElementById('btnBlue').innerText = t.btnBlue;
        document.getElementById('btnGold').innerText = t.btnGold;
        document.querySelector('.th-pick').innerText = t.pick;
        document.querySelector('.th-bet').innerText = t.bet;
        document.querySelector('.th-res').innerText = t.res;
        document.querySelector('.th-win').innerText = t.win;
        document.getElementById('howMsg').innerText = t.howMsg;
        document.querySelector('.lbl-total').innerText = t.totalSpins;
        document.querySelector('.lbl-winrate').innerText = t.winRate;
        document.getElementById('loginTitle').innerText = t.sync;
        document.getElementById('loginInput').placeholder = t.loginPlaceholder;
        document.getElementById('btnLogin').innerText = t.login;
        document.querySelector('.lb-black').innerText = t.btnBlack.split(' ')[0];
        document.querySelector('.lb-red').innerText = t.btnRed.split(' ')[0];
        document.querySelector('.lb-blue').innerText = t.btnBlue.split(' ')[0];
        document.querySelector('.lb-gold').innerText = t.btnGold.split(' ')[0];
    }

    /* 지능형 봇 로직 (v5.6 최적화 유지) */
    function generateAdvancedBotId() {
        const adjs = ["Vip", "Pro", "Super", "Lucky", "Cool", "Big", "Ace", "Gold", "Top"];
        const nouns = ["King", "User", "Player", "Dragon", "Star", "Wolf", "Winner", "Boss"];
        const p = Math.random();
        if(p < 0.3) return adjs[Math.floor(Math.random()*adjs.length)] + nouns[Math.floor(Math.random()*nouns.length)];
        if(p < 0.6) return nouns[Math.floor(Math.random()*nouns.length)] + Math.floor(Math.random()*999);
        if(p < 0.9) return adjs[Math.floor(Math.random()*adjs.length)] + "_" + Math.floor(Math.random()*99);
        return Math.random().toString(36).substring(2, 6).toUpperCase();
    }

    function spawnBotBet() {
        const elapsed = Date.now() % CYCLE_MS;
        if(elapsed < FREEZE_PERIOD || elapsed > CYCLE_MS - 2000) return;

        const botId = generateAdvancedBotId();
        const strategy = Math.random();
        let type, amt;

        if(strategy < 0.5) { // 소액 분산
            type = Math.random() < 0.6 ? 'black' : 'red';
            amt = (Math.floor(Math.random() * 20) + 1) * 10000;
        } else if(strategy < 0.8) { // 고액
            type = 'blue';
            amt = (Math.floor(Math.random() * 50) + 10) * 10000;
        } else { // 잭팟형
            type = 'gold';
            amt = 10000;
        }

        setTimeout(() => { addLiveUI(type, botId, amt); }, Math.random() * 1200); 
    }

    function tick() {
        const now = Date.now(), elapsed = now % CYCLE_MS;
        if (elapsed < FREEZE_PERIOD) {
            timerBar.style.width = "0%"; betOverlay.style.display = "flex";
            if (elapsed < 200 && !isSpinning) startSpin(); 
        } else {
            isSpinning = false; const remaining = CYCLE_MS - elapsed;
            timerBar.style.width = (remaining / BETTING_PERIOD) * 100 + "%";
            timerBar.style.backgroundColor = `hsl(${(remaining / BETTING_PERIOD) * 60}, 100%, 50%)`;
            betOverlay.style.display = (remaining < 1000) ? "flex" : "none";
            if(Math.random() < 0.08) spawnBotBet(); 
        }
    }

    function saveData() { localStorage.setItem('db_wheel_v57_data', JSON.stringify({ balance, currentId, myGameStats, stats })); }
    function loadData() {
        const saved = localStorage.getItem('db_wheel_v57_data');
        if(saved) { const p = JSON.parse(saved); balance = p.balance; currentId = p.currentId; myGameStats = p.myGameStats; stats = p.stats; }
    }

    function getWinIndex(seed) {
        const rv = (seed * 9301 + 49297) % 233280;
        return { index: Math.floor(((360 - ((rv % 360) + 90) % 360) + 360) % 360 / (360 / 54)) % 54, degrees: (rv % 360) + (360 * 10) };
    }

    function startSpin() {
        isSpinning = true; const res = getWinIndex(Math.floor(Date.now() / CYCLE_MS));
        canvas.style.transition = `transform ${SPIN_DURATION}ms cubic-bezier(0.15, 0, 0.1, 1)`;
        canvas.style.transform = `rotate(${res.degrees}deg)`;
        let tickCount = 0; const tickInt = setInterval(() => { if(tickCount < 35 && isSpinning) { playSound('sndTick'); tickCount++; } else clearInterval(tickInt); }, 180);
        setTimeout(() => { resolve(wheelMap[res.index]); }, SPIN_DURATION);
    }

    function resolve(win) {
        document.getElementById('wheelPointer').style.backgroundColor = win.color;
        globalHistory.push(win.color); stats[win.name]++;
        if(myBet) {
            myGameStats.total++;
            if(myBet.type === win.name) { balance += (myBet.amount * win.mult); myGameStats.wins++; playSound('sndWin'); } else playSound('sndLose');
            const row = `<tr><td>${myBet.type.toUpperCase()}</td><td>${myBet.amount.toLocaleString()}</td><td>${myBet.type === win.name ? 'Win' : 'Lost'}</td><td><span style="display:inline-block; width:10px; height:10px; border-radius:50%; background:${win.color}"></span></td></tr>`;
            document.getElementById('myLogBody').insertAdjacentHTML('afterbegin', row);
        }
        updateHistoryUI(); saveData();
        setTimeout(() => {
            myBet = null; liveBoardTotals = { black:0, red:0, blue:0, gold:0 };
            document.querySelectorAll('.bet-list').forEach(l => l.innerHTML = '');
            document.querySelectorAll('.col-total').forEach(t => t.innerText = '0');
            document.getElementById('wheelPointer').style.backgroundColor = '#fff';
            canvas.style.transition = 'none'; canvas.style.transform = 'rotate(0deg)'; updateBalUI();
        }, RESULT_WAIT);
    }

    function updateHistoryUI() {
        const strip = document.getElementById('historyStrip'); strip.innerHTML = '';
        globalHistory.slice(-20).reverse().forEach(c => { strip.innerHTML += `<div class="hist-bar" style="background:${c}"></div>`; });
    }

    function syncHistory() {
        const seed = Math.floor(Date.now() / CYCLE_MS);
        globalHistory = []; for(let i=20; i>=1; i--) { globalHistory.push(wheelMap[getWinIndex(seed - i).index].color); }
        updateHistoryUI();
    }

    function handleUserBet(type) {
        const elapsed = Date.now() % CYCLE_MS;
        if(elapsed < FREEZE_PERIOD || elapsed > CYCLE_MS - 1000 || myBet) return;
        const amt = parseInt(document.getElementById('betInput').value);
        if(amt > balance || amt < 10000) return;
        balance -= amt; updateBalUI(); myBet = { type, amount: amt }; addLiveUI(type, "ME", amt); saveData();
    }

    function addLiveUI(type, user, amt) {
        const list = document.getElementById(`l-${type}`), total = document.getElementById(`t-${type}`);
        liveBoardTotals[type] += amt; total.innerText = liveBoardTotals[type].toLocaleString();
        const item = document.createElement('div'); item.className = 'bet-item';
        item.innerHTML = `<span>${user}</span><b>${(amt/1000).toFixed(0)}k</b>`;
        list.prepend(item); if(list.children.length > 5) list.lastChild.remove();
    }

    function switchTab(id, el) {
        document.querySelectorAll('.content-view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active');
        if(id === 'recommend') {
            document.getElementById('st-total').innerText = myGameStats.total;
            document.getElementById('st-winrate').innerText = (myGameStats.total > 0 ? (myGameStats.wins/myGameStats.total*100).toFixed(1) : 0) + "%";
        }
    }

    function updateBalUI() { document.getElementById('balance').innerText = balance.toLocaleString(); }
    function adjBet(v) { let input = document.getElementById('betInput'), n = parseInt(input.value) + v; if(n >= 10000) input.value = n; }
    function initAudio() { audioInitialized = true; }
    function toggleMute() { isMuted = !isMuted; document.getElementById('soundToggle').innerText = isMuted ? "🔇" : "🔊"; }
    function playSound(id) { if(!isMuted && audioInitialized) { const s = document.getElementById(id); s.currentTime = 0; s.play().catch(()=>{}); } }
    
    function drawWheel() {
        const arc = (Math.PI * 2) / 54;
        for (let i = 0; i < 54; i++) {
            ctx.beginPath(); ctx.fillStyle = wheelMap[i].color; ctx.moveTo(250, 250); ctx.arc(250, 250, 250, i * arc, (i + 1) * arc); ctx.fill();
        }
        ctx.beginPath(); ctx.fillStyle = "#16191e"; ctx.arc(250, 250, 230, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.fillStyle = "#000"; ctx.arc(250, 250, 112, 0, Math.PI * 2); ctx.fill();
    }

    function doLogin() {
        const id = document.getElementById('loginInput').value.trim();
        if(!id) return; currentId = id; saveData(); applyI18n(); switchTab('home', document.querySelector('.nav-item'));
    }

    loadData(); syncHistory(); drawWheel(); updateBalUI(); setInterval(tick, 100);
</script>
</body>
</html>
