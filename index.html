<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spin4 v5.72 Golden Master</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-top: #1e2128; --bg-bottom: #0e1013;
            --card: #1a1d23; --accent: #00f2ff;
            --gold: #ffcc00; --blue: #00e5ff;
            --red: #ff3333; --black: #444444; 
            --text-muted: #8899aa; --nav-bg: #16191e;
            --point-color: #ff9500; --buy-color: #ff00ff;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100dvh; overflow: hidden; touch-action: manipulation; background: #1e2128; color: white; font-family: 'Pretendard', sans-serif; }
        .main-container { width: 100%; max-width: 500px; height: 100%; margin: 0 auto; display: flex; flex-direction: column; position: relative; overflow-x: hidden; }

        /* [수정] 언어 선택 오버레이 - 반투명 디자인 */
        #langOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.7); /* 반투명 배경 */
            z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            backdrop-filter: blur(15px); /* 블러 효과 */
            -webkit-backdrop-filter: blur(15px);
        }
        .lang-list { display: flex; flex-direction: column; gap: 15px; width: 260px; }
        .lang-btn { 
            background: rgba(255, 255, 255, 0.08); 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            color: #fff; padding: 18px 25px; border-radius: 15px; 
            font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; transition: all 0.2s ease;
        }
        .lang-btn:active { background: rgba(255, 255, 255, 0.2); transform: scale(0.98); }

        header { padding: 12px 18px; background: rgba(0,0,0,0.4); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .user-id { font-size: 0.8rem; font-weight: 700; border-left: 3px solid var(--accent); padding-left: 10px; }
        .balance-box { background: rgba(255, 149, 0, 0.05); padding: 5px 10px; border-radius: 6px; border: 1px solid var(--point-color); color: var(--point-color); font-weight: 800; font-size: 0.85rem; }

        /* v5.49 히스토리 바 디자인 유지 */
        .rolls-wrapper { width: 100%; padding: 10px 15px; background: rgba(0,0,0,0.2); border-bottom: 1px solid #333; flex-shrink: 0; }
        .history-strip { display: flex; gap: 3px; height: 40px; width: 100%; align-items: center; justify-content: flex-start; overflow: hidden; }
        .hist-bar { width: 3px; border-radius: 1px; flex-shrink: 0; transition: all 0.3s; }
        .hist-bar.normal { height: 22px; opacity: 0.8; }
        .hist-bar.gold-bar { height: 36px; width: 4px; box-shadow: 0 0 10px var(--gold); z-index: 5; }

        .timer-container { width: 100%; height: 6px; background: #000; position: relative; flex-shrink: 0; }
        #timerBar { position: absolute; left: 0; top: 0; height: 100%; width: 0%; transition: width 0.1s linear; }

        .content-view { flex: 1; overflow-y: auto; display: none; padding-bottom: 90px; width: 100%; align-items: center; }
        .content-view.active { display: flex; flex-direction: column; }

        /* v5.49 휠 섹션 및 하단 화살표 로직 고정 */
        .wheel-section { position: relative; margin: 25px 0; width: 230px; height: 230px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        #wheelCanvas { width: 100%; height: 100%; border-radius: 50%; }
        .wheel-logo { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; font-weight: 900; font-size: 1.8rem; color: var(--accent); text-shadow: 0 0 10px var(--accent); opacity: 0.8; pointer-events: none; }
        /* v5.49 화살표 위치: 하단(6시) */
        .pointer { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); width: 14px; height: 20px; background: #fff; clip-path: polygon(50% 100%, 0% 0%, 100% 0%); z-index: 25; transition: background-color 0.1s linear; }

        .overlay-container { width: 100%; padding: 0 15px; position: relative; }
        .controls { width: 100%; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #333; }
        
        /* v5.49 배팅 입력창 스타일 유지 */
        #betInput {
            flex: 1; background: #000; border: 1px solid #333; color: var(--accent); 
            padding: 12px; border-radius: 8px; text-align: center; font-weight: 900; 
            outline: none; -webkit-appearance: none; margin: 0;
        }

        .bet-buttons { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 12px; }
        .btn { height: 65px; background: transparent; border: 1.5px solid transparent; border-radius: 4px; font-weight: 900; font-size: 1.1rem; color: #fff; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; }
        .btn-black { border-color: #555; color: #777; } .btn-red { border-color: var(--red); color: var(--red); }
        .btn-blue { border-color: var(--blue); color: var(--blue); } .btn-gold { border-color: var(--gold); color: var(--gold); }
        .btn.selected.btn-red { background: var(--red); border-color: var(--red); color: #000; }
        .btn.selected.btn-blue { background: var(--blue); border-color: var(--blue); color: #000; }
        .btn.selected.btn-gold { background: var(--gold); border-color: var(--gold); color: #000; }

        /* 하단 메뉴 v5.49 순서 및 로직 고정 */
        nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; height: 75px; background: var(--nav-bg); display: flex; border-top: 1px solid #222; z-index: 200; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); cursor: pointer; }
        .nav-item span { font-size: 0.75rem; font-weight: 700; }
        .nav-item.active { color: var(--accent); }

        .version-tag { font-size: 0.65rem; color: #555; margin-top: 20px; text-align: center; width: 100%; font-weight: bold; }
        .closed-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75); z-index: 100; display: none; align-items: center; justify-content: center; border-radius: 12px; }
    </style>
</head>
<body onclick="initAudio()">

<div id="langOverlay">
    <h3 id="langSelTitle" style="color:var(--accent); font-weight:900; margin-bottom:30px; letter-spacing:2px;">SELECT LANGUAGE</h3>
    <div class="lang-list">
        <div class="lang-btn" onclick="setLanguage('en')"><span>🇺🇸 English</span><span>〉</span></div>
        <div class="lang-btn" onclick="setLanguage('cn')"><span>🇨🇳 简体中文</span><span>〉</span></div>
        <div class="lang-btn" onclick="setLanguage('jp')"><span>🇯🇵 日本語</span><span>〉</span></div>
        <div class="lang-btn" onclick="setLanguage('ko')"><span>🇰🇷 한국어</span><span>〉</span></div>
    </div>
</div>

<div class="main-container">
    <header>
        <div class="user-id" id="displayId">Welcome Guest</div>
        <div class="balance-box"><span id="balance">1,000,000</span> P</div>
    </header>

    <div class="rolls-wrapper"><div id="historyStrip" class="history-strip"></div></div>
    <div class="timer-container"><div id="timerBar"></div></div>

    <div id="view-home" class="content-view active">
        <div class="wheel-section">
            <div class="pointer" id="wheelPointer"></div>
            <div class="wheel-logo">Spin4</div>
            <canvas id="wheelCanvas" width="560" height="560"></canvas>
        </div>
        <div class="overlay-container">
            <div id="betOverlay" class="closed-overlay"><div id="closedTxt" style="color:#fff; font-weight:900; font-size:1.6rem;">CLOSED</div></div>
            <div class="controls">
                <div style="display:flex; gap:8px; align-items:center;">
                    <input type="number" id="betInput" value="10000">
                    <div style="display:flex; flex-direction:column; gap:2px;">
                        <button onclick="adjBet(10000)" style="width:40px; height:24px; background:#333; border:none; color:#fff; border-radius:4px;">+</button>
                        <button onclick="adjBet(-10000)" style="width:40px; height:24px; background:#333; border:none; color:#fff; border-radius:4px;">-</button>
                    </div>
                </div>
                <div class="bet-buttons">
                    <button class="btn btn-black" onclick="handleUserBet('black')" id="btnBlack">2×</button>
                    <button class="btn btn-red" onclick="handleUserBet('red')" id="btnRed">3×</button>
                    <button class="btn btn-blue" onclick="handleUserBet('blue')" id="btnBlue">5×</button>
                    <button class="btn btn-gold" onclick="handleUserBet('gold')" id="btnGold">50×</button>
                </div>
            </div>
        </div>
        <table class="log-table" id="logTable" style="width:95%; margin-top:20px; border-collapse:collapse; font-size:0.75rem; text-align:center;">
            <thead><tr style="color:var(--text-muted);"><th>PICK</th><th>BET</th><th>RES</th></tr></thead>
            <tbody id="myLogBody"></tbody>
        </table>
    </div>

    <div id="view-ranking" class="content-view"></div>
    <div id="view-how" class="content-view"></div>
    <div id="view-recommend" class="content-view">
        <div id="statsArea" style="width:100%; padding:20px;"></div>
        <div class="version-tag">Spin4 v5.72 Golden Master | Physical Sync v5.49</div>
    </div>
    <div id="view-login" class="content-view"></div>

    <nav>
        <div class="nav-item active" onclick="switchTab('home', this)"><span>🏠 홈</span></div>
        <div class="nav-item" onclick="switchTab('ranking', this)"><span>🏆 랭킹</span></div>
        <div class="nav-item" onclick="switchTab('how', this)"><span>❓ 사용법</span></div>
        <div class="nav-item" onclick="switchTab('recommend', this)"><span>📈 통계</span></div>
        <div class="nav-item" onclick="switchTab('login', this)"><span>👤 로그인</span></div>
    </nav>
</div>

<script>
    // [v5.49 핵심 로직 고정]
    const sectors = [{color:'#ffcc00', name:'gold', mult:50, weight: 1},{color:'#00e5ff', name:'blue', mult:5, weight: 10},{color:'#ff3333', name:'red', mult:3, weight: 17},{color:'#444444', name:'black', mult:2, weight: 28}];
    const wheelMap = []; sectors.forEach(s => { for(let i=0; i<s.weight; i++) wheelMap.push(s); });
    // v5.49 셔플 로직 유지
    const seed_init = 123; for (let i = wheelMap.length - 1; i > 0; i--) { const j = (seed_init * (i + 1)) % wheelMap.length; [wheelMap[i], wheelMap[j]] = [wheelMap[j], wheelMap[i]]; }

    let balance = 1000000, currentLang = 'en', isSpinning = false, myBet = null, globalHistory = [];
    const CYCLE_MS = 20000, SPIN_DURATION = 6500, FREEZE = 9000;
    const canvas = document.getElementById('wheelCanvas'), ctx = canvas.getContext('2d');

    function drawWheel() {
        const arc = (Math.PI * 2) / 56; ctx.clearRect(0,0,560,560); ctx.lineWidth = 14; 
        for (let i = 0; i < 56; i++) {
            ctx.beginPath(); ctx.strokeStyle = wheelMap[i].color;
            // v5.49 영점 고정: 90도 오프셋 (하단 화살표 대응)
            ctx.arc(280, 280, 260, i * arc + Math.PI/2, (i + 1) * arc + Math.PI/2); ctx.stroke();
        }
    }

    function tick() {
        const now = Date.now(), elapsed = now % CYCLE_MS, pointer = document.getElementById('wheelPointer');
        if (elapsed < FREEZE) {
            document.getElementById('betOverlay').style.display = "flex";
            if (elapsed < 200 && !isSpinning) startSpin();
            if(isSpinning) {
                const rot = getCurrentRotation(), arc = 360 / 56;
                // v5.49 하단 화살표 물리 판정 로직 고정
                const idx = Math.floor(((180 - (rot % 360)) % 360 + 360) % 360 / arc) % 56;
                pointer.style.backgroundColor = wheelMap[idx].color;
            }
        } else {
            isSpinning = false;
            document.getElementById('betOverlay').style.display = "none";
            document.getElementById('timerBar').style.width = ((CYCLE_MS - elapsed) / (CYCLE_MS - FREEZE)) * 100 + "%";
            pointer.style.backgroundColor = "#fff";
        }
    }

    function getCurrentRotation() {
        const st = window.getComputedStyle(canvas), tr = st.getPropertyValue("transform");
        if(tr === "none") return 0;
        const v = tr.split('(')[1].split(')')[0].split(',');
        return (Math.round(Math.atan2(parseFloat(v[1]), parseFloat(v[0])) * (180/Math.PI)) + 360) % 360;
    }

    function startSpin() {
        isSpinning = true;
        const seed = Math.floor(Date.now() / CYCLE_MS);
        const rv = (seed * 9301 + 49297) % 233280;
        const targetIdx = rv % 56;
        const arc = 360 / 56;
        // v5.49 하단 화살표 타겟팅 각도 계산 고정
        const targetDeg = (180 - (targetIdx * arc + arc / 2) + 360) % 360;
        canvas.style.transition = `transform ${SPIN_DURATION}ms cubic-bezier(0.15, 0, 0.1, 1)`;
        canvas.style.transform = `rotate(${targetDeg + (360 * 10)}deg)`;
        setTimeout(() => resolve(wheelMap[targetIdx]), SPIN_DURATION);
    }

    function resolve(win) {
        globalHistory.push(win.color);
        if(myBet) {
            if(myBet.type === win.name) balance += (myBet.amount * win.mult);
            const row = `<tr><td>${myBet.type.toUpperCase()}</td><td>${myBet.amount}</td><td style="color:${win.color}">${win.name.toUpperCase()}</td></tr>`;
            document.getElementById('myLogBody').insertAdjacentHTML('afterbegin', row);
            myBet = null;
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('selected'));
        }
        updateBalUI(); updateHistoryUI();
    }

    function updateHistoryUI() {
        const strip = document.getElementById('historyStrip'); strip.innerHTML = '';
        [...globalHistory].slice(-55).reverse().forEach(color => {
            const bar = document.createElement('div');
            bar.className = 'hist-bar ' + (color === '#ffcc00' ? 'gold-bar' : 'normal');
            bar.style.backgroundColor = color; strip.appendChild(bar);
        });
    }

    function setLanguage(lang) {
        currentLang = lang;
        document.getElementById('langOverlay').style.display = 'none';
        // i18n 적용 로직 (v5.49 사양)
    }

    function switchTab(id, el) {
        document.querySelectorAll('.content-view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    function handleUserBet(type) {
        const el = Date.now() % CYCLE_MS; if(el < FREEZE || myBet) return;
        const amt = parseInt(document.getElementById('betInput').value);
        if(amt > balance) return;
        balance -= amt; updateBalUI();
        myBet = { type, amount: amt };
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('selected'));
        document.getElementById('btn' + type.charAt(0).toUpperCase() + type.slice(1)).classList.add('selected');
    }

    function adjBet(v) { let input = document.getElementById('betInput'), n = parseInt(input.value) + v; if(n >= 10000) input.value = n; }
    function updateBalUI() { document.getElementById('balance').innerText = balance.toLocaleString(); }
    function initAudio() {}

    drawWheel(); updateBalUI(); setInterval(tick, 100);
</script>
</body>
</html>
