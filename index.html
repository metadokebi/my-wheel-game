<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>v7.1 TON Golden Master</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* [고정] 골든 마스터 메인 UI 스타일 - 수정 금지 */
        :root {
            --tg-theme-bg-color: #ffffff;
            --color-black: #1a1a1a;
            --color-red: #e63946;
            --color-blue: #457b9d;
            --color-gold: #ffb703;
        }
        body { margin: 0; padding: 0; font-family: sans-serif; background: var(--tg-theme-bg-color); overflow: hidden; }
        .tab-content { display: none; height: 100vh; position: relative; }
        .tab-content.active { display: flex; flex-direction: column; align-items: center; }
        
        /* 배틀 아레나 전용 스타일 */
        #battle-container { width: 100%; padding: 20px; box-sizing: border-box; }
        .battle-room-list { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .room-card { border: 1px solid #ddd; padding: 10px; border-radius: 12px; text-align: center; background: #f9f9f9; }
        
        /* 휠 공통 스타일 */
        .wheel-box { position: relative; width: 300px; height: 300px; margin: 20px auto; }
        #battle-wheel-svg { width: 100%; height: 100%; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); }
        
        /* 하단 메뉴 고정 */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 60px; display: flex; background: #fff; border-top: 1px solid #eee; }
        .nav-item { flex: 1; display: flex; justify-content: center; align-items: center; font-size: 12px; flex-direction: column; }
        
        /* 버전 표시 */
        .version-tag { font-size: 10px; color: #aaa; margin-top: auto; padding-bottom: 70px; }
        .countdown-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 48px; font-weight: bold; color: var(--color-gold); text-shadow: 2px 2px 4px rgba(0,0,0,0.5); display: none; z-index: 10; }
    </style>
</head>
<body>

    <div id="home" class="tab-content active">
        <h3>Main Game</h3>
        <div class="wheel-box">
            <svg id="main-wheel-svg" viewBox="0 0 300 300"></svg>
        </div>
        <div id="betting-ui">베팅 시스템 (고정)</div>
    </div>

    <div id="battle" class="tab-content">
        <h3>Battle Arena</h3>
        <div class="wheel-box">
            <div id="countdown" class="countdown-overlay">5</div>
            <svg id="battle-wheel-svg" viewBox="0 0 300 300"></svg>
        </div>
        <div id="battle-info">방 참여 대기중...</div>
        <div id="room-list" class="battle-room-list"></div>
    </div>

    <div id="stats" class="tab-content">
        <h3>Statistics</h3>
        <div id="user-stats">기록 정보...</div>
        <div class="version-tag">v7.0 TON Golden Master</div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item" onclick="showTab('home')">홈</div>
        <div class="nav-item" onclick="showTab('battle')">배틀</div>
        <div class="nav-item" onclick="showTab('stats')">통계</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const currentUser = { id: tg.initDataUnsafe?.user?.id || 12345, photo_url: tg.initDataUnsafe?.user?.photo_url || '' };
        
        // [수정 4] 색상값 동기화
        const COLORS = ["#1a1a1a", "#e63946", "#457b9d", "#ffb703"]; // Black, Red, Blue, Gold

        // --- [SECTION: BATTLE ARENA CORE UPDATE] ---

        // [수정 6] 방 개수 2~6개 랜덤 생성
        function loadBattleRooms() {
            const list = document.getElementById('room-list');
            list.innerHTML = '';
            const roomCount = Math.floor(Math.random() * 5) + 2; 

            for(let i=1; i<=roomCount; i++) {
                // [수정 5] 2~4인 대결 구성
                const max = Math.floor(Math.random() * 3) + 2; 
                const card = document.createElement('div');
                card.className = 'room-card';
                card.innerHTML = `Room ${i}<br>${max} Players<br><button onclick="joinRoom(${max})">Join</button>`;
                list.appendChild(card);
            }
        }

        function joinRoom(max) {
            const participants = [];
            // [수정 7] 본인은 'me'로 표시
            participants.push({ id: 'me', username: 'me', photo_url: currentUser.photo_url });
            
            // 나머지 봇 채우기
            for(let i=1; i < max; i++) {
                participants.push({ id: `bot_${i}`, username: `Bot_${i}`, photo_url: `https://api.dicebear.com/7.x/pixel-art/svg?seed=${i}` });
            }

            renderBattleWheel(participants);
            // [수정 8] 풀방 시 5초 대기 후 동작
            startBattleTimer(participants);
        }

        // [수정 1, 2, 3, 9] 배틀 휠 렌더링 (내부 로고, 이미지, 하단 화살표)
        function renderBattleWheel(pp) {
            const svg = document.getElementById('battle-wheel-svg');
            svg.innerHTML = '';
            const step = 360 / pp.length;

            pp.forEach((p, i) => {
                const start = i * step;
                const end = (i+1) * step;
                const mid = (start + end) / 2;
                const rad = (mid - 90) * Math.PI / 180;

                // 조각 그리기
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", describeArc(150, 150, 140, start, end));
                path.setAttribute("fill", COLORS[i % COLORS.length]);
                svg.appendChild(path);

                // 프로필 이미지 삽입
                const imgX = 150 + (85 * Math.cos(rad)) - 20;
                const imgY = 150 + (85 * Math.sin(rad)) - 20;
                const img = document.createElementNS("http://www.w3.org/2000/svg", "image");
                img.setAttributeNS("http://www.w3.org/1999/xlink", "href", p.photo_url || 'https://api.dicebear.com/7.x/bottts/svg?seed=7');
                img.setAttribute("x", imgX); img.setAttribute("y", imgY);
                img.setAttribute("width", "40"); img.setAttribute("height", "40");
                svg.appendChild(img);

                // 이름 'me' 표시
                const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
                txt.setAttribute("x", imgX + 20); txt.setAttribute("y", imgY + 55);
                txt.setAttribute("fill", "white"); txt.setAttribute("font-size", "10");
                txt.setAttribute("text-anchor", "middle");
                txt.textContent = p.username;
                svg.appendChild(txt);
            });

            // [수정 2] 중앙 하단 내부 화살표
            const arrow = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
            arrow.setAttribute("points", "140,285 160,285 150,255");
            arrow.setAttribute("fill", "white");
            arrow.setAttribute("stroke", "black");
            svg.appendChild(arrow);
        }

        function startBattleTimer(pp) {
            const cd = document.getElementById('countdown');
            cd.style.display = 'block';
            let count = 5;
            const itv = setInterval(() => {
                cd.textContent = count;
                count--;
                if(count < 0) {
                    clearInterval(itv);
                    cd.style.display = 'none';
                    runSpin(pp.length);
                }
            }, 1000);
        }

        function runSpin(count) {
            // [고정] RNG 로직 기반 결과 도출
            const resultIndex = Math.floor(Math.random() * count); 
            const stopAngle = 3600 + (360 - (resultIndex * (360/count)));
            document.getElementById('battle-wheel-svg').style.transform = `rotate(${stopAngle}deg)`;
            
            setTimeout(() => {
                alert(`Winner: ${COLORS[resultIndex % 4]} Area!`);
            }, 4500);
        }

        // --- [CORE UTILS - DO NOT TOUCH] ---
        function describeArc(x, y, radius, startAngle, endAngle){
            const start = polarToCartesian(x, y, radius, endAngle);
            const end = polarToCartesian(x, y, radius, startAngle);
            const largeArcFlag = endAngle - startAngle <= 180 ? "0" : "1";
            return ["M", start.x, start.y, "A", radius, radius, 0, largeArcFlag, 0, end.x, end.y, "L", x, y, "Z"].join(" ");
        }
        function polarToCartesian(centerX, centerY, radius, angleInDegrees) {
            const angleInRadians = (angleInDegrees-90) * Math.PI / 180.0;
            return { x: centerX + (radius * Math.cos(angleInRadians)), y: centerY + (radius * Math.sin(angleInRadians)) };
        }
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'battle') loadBattleRooms();
        }

        // 초기 실행
        tg.expand();
        loadBattleRooms();
    </script>
</body>
</html>
