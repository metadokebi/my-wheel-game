<!DOCTYPE html>

                    <button class="btn btn-black" onclick="handleUserBet('black')" id="btnBlack">2×</button>
                    <button class="btn btn-red" onclick="handleUserBet('red')" id="btnRed">3×</button>
                    <button class="btn btn-blue" onclick="handleUserBet('blue')" id="btnBlue">5×</button>
                    <button class="btn btn-gold" onclick="handleUserBet('gold')" id="btnGold">50×</button>
                </div>
            </div>
            <div class="live-betting-area">
                <div id="liveTitle" style="font-size:0.7rem; color:#8899aa; margin-bottom:8px; font-weight:900; text-align:center;">LIVE STATUS</div>
                <div class="live-grid">
                    <div class="live-col" style="border-top-color:var(--black);"><div class="col-head"><span id="cl1">BLACK</span><span id="t-black" class="col-total">0</span></div><div id="l-black" class="bet-list"></div></div>
                    <div class="live-col" style="border-top-color:var(--red);"><div class="col-head"><span id="cl2">RED</span><span id="t-red" class="col-total">0</span></div><div id="l-red" class="bet-list"></div></div>
                    <div class="live-col" style="border-top-color:var(--blue);"><div class="col-head"><span id="cl3">BLUE</span><span id="t-blue" class="col-total">0</span></div><div id="l-blue" class="bet-list"></div></div>
                    <div class="live-col" style="border-top-color:var(--gold);"><div class="col-head"><span id="cl4">GOLD</span><span id="t-gold" class="col-total">0</span></div><div id="l-gold" class="bet-list"></div></div>
                </div>
            </div>
        </div>
        <table class="log-table">
            <thead><tr><th id="th-pick">Pick</th><th id="th-bet">Bet</th><th id="th-res">Result</th><th id="th-win">Winner</th></tr></thead>
            <tbody id="myLogBody"></tbody>
        </table>
    </div>

    <div id="view-wallet" class="content-view">
        <div style="padding:25px 0; text-align:center;"><h3 id="walletMainTitle" style="color:var(--crypto-color); margin:0;">CRYPTO WALLET</h3></div>
        <div class="wallet-card">
            <div class="crypto-balance"><span id="w-ton" style="color:var(--accent); font-weight:800;">TONCOIN (TON)</span><span style="font-weight:900;" id="amt-ton">0.00 TON</span></div>
            <div class="crypto-balance"><span id="w-usdt" style="color:var(--accent); font-weight:800;">TETHER (USDT)</span><span style="font-weight:900;" id="amt-usdt">0.00 USDT</span></div>
            <div class="wallet-actions"><button class="wallet-btn" style="background:var(--crypto-color); color:#fff;" id="btnDeposit">DEPOSIT</button><button class="wallet-btn" style="background:#333; color:#aaa;" id="btnWithdraw">WITHDRAW</button></div>
        </div>
        <div id="walletDesc" style="padding:20px; font-size:0.75rem; color:#667788; line-height:1.6;"></div>
    </div>
    <div id="view-ranking" class="content-view">
        <div style="padding:20px 0; text-align:center;"><h3 id="rankMainTitle" style="color:var(--gold); margin:0;">TOP 100 RANKING</h3></div>
        <table class="log-table" style="width:98%;">
            <thead><tr><th style="width:12%" id="rh-rank">#</th><th id="rh-id">User ID</th><th id="rh-bet">Bet</th><th id="rh-win">Win</th><th id="rh-rate">Rate</th></tr></thead>
            <tbody id="rankingBody"></tbody>
        </table>
    </div>
    <div id="view-how" class="content-view"><div id="howContent" style="width:100%; padding:10px;"></div></div>
    <div id="view-recommend" class="content-view">
        <div style="padding:30px 20px 10px; text-align:center;"><div style="font-size:0.85rem; font-weight:900; color:var(--accent);" id="lblLast100Stats">DIGITAL ANALYSIS</div></div>
        <div id="statsContainer" class="digital-stats"></div>
    </div>
    <div id="view-login" class="content-view">
        <div id="loginForm" class="login-box">
            <h3 id="loginFormTitle" style="color:var(--accent); text-align:center; margin:0;">Secure Login</h3>
            <input type="text" id="loginId" class="login-input" placeholder="ID" oninput="handleIdInput()">
            <input type="password" id="loginPw" class="login-input" placeholder="PW">
            <div id="pwConfirmGroup" style="display:none; flex-direction:column; gap:15px;"><input type="password" id="loginPwCheck" class="login-input" placeholder="Confirm PW"></div>
            <div id="loginMsg" style="font-size:0.7rem; color:var(--red); text-align:center; min-height:1.2rem;"></div>
            <button id="btnLoginBtn" onclick="handleLoginSubmit()" style="width:100%; height:50px; background:var(--gold); color:#000; border:none; border-radius:8px; font-weight:900;">LOGIN</button>
        </div>
        <div id="logoutForm" style="display:none; text-align:center; padding:40px 0; width:100%;"><h3 id="loggedInMsg" style="color:var(--accent);">Welcome!</h3><button onclick="handleLogout()" style="width:80%; height:50px; background:var(--red); color:#fff; border:none; border-radius:8px; font-weight:900;">LOGOUT</button></div>
    </div>

    <nav>
        <div class="nav-item active" onclick="switchTab('home', this)"><div class="nav-icon">🏠</div><span id="navHome">홈</span></div>
        <div class="nav-item" onclick="switchTab('wallet', this)"><div class="nav-icon">👛</div><span id="navWallet">지갑</span></div>
        <div class="nav-item" onclick="switchTab('ranking', this)"><div class="nav-icon">🏆</div><span id="navRank">랭킹</span></div>
        <div class="nav-item" onclick="switchTab('how', this)"><div class="nav-icon">❓</div><span id="navHow">사용법</span></div>
        <div class="nav-item" onclick="switchTab('recommend', this)"><div class="nav-icon">📈</div><span id="navStats">통계</span></div>
        <div class="nav-item" onclick="switchTab('login', this)"><div class="nav-icon">👤</div><span id="navLogin">로그인</span></div>
    </nav>
</div>

<audio id="sndTick" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
<audio id="sndWin" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>
<audio id="sndLose" src="https://assets.mixkit.co/active_storage/sfx/2004/2004-preview.mp3"></audio>

<script>
    const tg = window.Telegram.WebApp; tg.expand();
    let currentLang = 'en', currentId = "GUEST", balance = 1000000;
    let isSpinning = false, myBet = null, globalHistory = [], stats = { black: 0, red: 0, blue: 0, gold: 0 };
    let myGameStats = { total: 0, wins: 0 }, isMuted = false, audioInitialized = false, liveBoardTotals = { black:0, red:0, blue:0, gold:0 };
    let currentAbsoluteRotation = 0, lastResultColor = "#fff";

    const sectors = [{color:'#ffcc00', name:'gold', mult:50, weight: 1},{color:'#00e5ff', name:'blue', mult:5, weight: 10},{color:'#ff3333', name:'red', mult:17, weight: 17},{color:'#444444', name:'black', mult:2, weight: 28}];
    const wheelMap = []; sectors.forEach(s => { for(let i=0; i<s.weight; i++) wheelMap.push(s); });
    function shuffleWheel() { const seed = 123; for (let i = wheelMap.length - 1; i > 0; i--) { const j = (seed * (i + 1)) % wheelMap.length; [wheelMap[i], wheelMap[j]] = [wheelMap[j], wheelMap[i]]; } }
    shuffleWheel();

    const i18n = {
        ko: { 
            welcome: "환영합니다", buy: "구매", closed: "마감", live: "실시간 현황", home: "홈", rank: "랭킹", how: "사용법", stats: "통계", login: "로그인", logout: "로그아웃", wallet: "지갑", walletTitle: "코인 지갑", walletDesc: "* 코인 입금 시 포인트로 자동 전환됩니다.<br>* 환전은 연결된 지갑으로 즉시 전송됩니다.", pick: "선택", bet: "금액", res: "결과", win: "당첨", rankTitle: "TOP 100 랭킹", rhRank: "순위", last100: "최근 100회 디지털 분석",
            howTxt: `<div class="how-card"><div class="how-section"><div class="how-title">🛡️ Provably Fair (공정성)</div><div class="how-text">본 게임은 SHA-256 알고리즘과 UTC 시드를 채택하여 서버 조작이 절대 불가능함을 보장합니다.</div></div></div>`
        },
        en: { welcome: "Welcome", buy: "BUY", closed: "CLOSED", live: "LIVE STATUS", home: "Home", rank: "Ranking", how: "How", stats: "Stats", login: "Login", logout: "Logout", wallet: "Wallet", walletTitle: "CRYPTO WALLET", walletDesc: "* Deposits convert to points.<br>* Processed via TON.", rankTitle: "TOP 100 RANKING", last100: "LAST 100 ANALYSIS", howTxt: "Real-time fair wheel game using Provably Fair logic." }
    };

    const CYCLE_MS = 20000, SPIN_DURATION = 6500, RESULT_WAIT = 2000, FREEZE_PERIOD = SPIN_DURATION + RESULT_WAIT, BETTING_PERIOD = CYCLE_MS - FREEZE_PERIOD;
    const canvas = document.getElementById('wheelCanvas'), ctx = canvas.getContext('2d'), timerBar = document.getElementById('timerBar'), betOverlay = document.getElementById('betOverlay');

    function setLanguage(lang) { currentLang = lang; localStorage.setItem('db_wheel_lang', lang); document.getElementById('langOverlay').style.display = 'none'; applyI18n(); }
    function applyI18n() {
        const t = i18n[currentLang] || i18n.en;
        document.getElementById('displayId').innerText = `${t.welcome} ${currentId}`;
        document.getElementById('closedTxt').innerText = t.closed; document.getElementById('navHome').innerText = t.home; 
        document.getElementById('navRank').innerText = t.rank; document.getElementById('navHow').innerText = t.how; 
        document.getElementById('navStats').innerText = t.stats; document.getElementById('navLogin').innerText = (currentId === "GUEST") ? t.login : t.logout;
        document.getElementById('navWallet').innerText = t.wallet; document.getElementById('howContent').innerHTML = t.howTxt; 
        document.getElementById('rankMainTitle').innerText = t.rankTitle;
        if(document.getElementById('view-recommend').classList.contains('active')) renderStats();
    }

    function renderStats() {
        const counts = { black: 0, red: 0, blue: 0, gold: 0 };
        globalHistory.slice(-100).forEach(color => { if(color === '#444444') counts.black++; else if(color === '#ff3333') counts.red++; else if(color === '#00e5ff') counts.blue++; else if(color === '#ffcc00') counts.gold++; });
        const container = document.getElementById('statsContainer'); container.innerHTML = '';
        ['black', 'red', 'blue', 'gold'].forEach(c => {
            const pct = counts[c]; container.innerHTML += `<div class="stat-row" style="margin-bottom:12px;"><div style="display:flex; justify-content:space-between; font-size:0.7rem;"><span>${c.toUpperCase()}</span><span>${pct}%</span></div><div class="stat-bar-bg"><div style="height:100%; width:${pct}%; transition:width 1s; background:var(--${c})"></div></div></div>`;
        });
    }

    function renderRanking() {
        const tbody = document.getElementById('rankingBody'); tbody.innerHTML = '';
        for(let i=1; i<=100; i++) {
            const seed = i * 1234.56; const botId = "Player_" + Math.floor(seed % 9999);
            tbody.innerHTML += `<tr><td>${i}</td><td style="color:var(--accent);">${botId}</td><td>${(seed % 500).toFixed(0)}k</td><td style="color:var(--accent)">${(seed % 400).toFixed(0)}k</td><td>${(50 + (seed % 10)).toFixed(1)}%</td></tr>`;
        }
    }

    function updateHistoryUI() {
        const strip = document.getElementById('historyStrip'); strip.innerHTML = '';
        const reversedData = [...globalHistory].slice(-30).reverse();
        reversedData.forEach((color, idx) => {
            const bar = document.createElement('div');
            let hClass = 'h-black'; if(color === '#ff3333') hClass = 'h-red'; else if(color === '#00e5ff') hClass = 'h-blue'; else if(color === '#ffcc00') hClass = 'h-gold';
            bar.className = 'hist-bar ' + hClass; bar.style.backgroundColor = color; strip.appendChild(bar);
        });
    }

    function syncHistory() { const seed = Math.floor(Date.now() / CYCLE_MS); globalHistory = []; for(let i=1; i<=30; i++) { globalHistory.push(wheelMap[getWinIndex(seed - i).index].color); } updateHistoryUI(); }
    
    /* [v5.72 핵심] 드로잉 좌표 영점 고정 (12시 방향 시작) */
    function drawWheel() {
        const arc = (Math.PI * 2) / 56, radius = 260; ctx.clearRect(0,0,560,560); ctx.lineWidth = 14; 
        for (let i = 0; i < 56; i++) {
            ctx.beginPath(); ctx.strokeStyle = wheelMap[i].color;
            ctx.arc(280, 280, radius, i * arc - Math.PI/2 + 0.02, (i + 1) * arc - Math.PI/2 - 0.02); ctx.stroke();
        }
    }

    function tick() {
        const now = Date.now(), elapsed = now % CYCLE_MS, pointer = document.getElementById('wheelPointer');
        if (elapsed < FREEZE_PERIOD) {
            timerBar.style.width = "0%"; betOverlay.style.display = "flex";
            if (elapsed < 200 && !isSpinning) startSpin();
            if(isSpinning) {
                const rot = getCurrentRotation(), arc = 360 / 56;
                // [리얼 센서] 6시(180도) 지점의 색상을 물리적으로 역계산하여 즉시 투영
                const idx = Math.floor(((180 - (rot % 360) + 90 + 360) % 360) / arc) % 56;
                pointer.style.backgroundColor = wheelMap[idx].color;
            }
        } else {
            isSpinning = false; const rem = CYCLE_MS - elapsed;
            timerBar.style.width = (rem / BETTING_PERIOD) * 100 + "%";
            timerBar.style.backgroundColor = `hsl(${(rem / BETTING_PERIOD) * 60}, 100%, 50%)`;
            betOverlay.style.display = (rem < 1000) ? "flex" : "none";
            pointer.style.backgroundColor = lastResultColor; // 다음 판까지 고정
        }
    }

    function getCurrentRotation() { const st = window.getComputedStyle(canvas, null), tr = st.getPropertyValue("transform"); if(tr === "none") return 0; const v = tr.split('(')[1].split(')')[0].split(','); return (Math.round(Math.atan2(parseFloat(v[1]), parseFloat(v[0])) * (180/Math.PI)) + 360) % 360; }

    /* [v5.72 핵심] 결과 인덱스에 화살표를 강제 정렬시키는 물리 엔진 */
    function startSpin() {
        isSpinning = true;
        const res = getWinIndex(Math.floor(Date.now() / CYCLE_MS));
        const arc = 360 / 56;
        
        // 당첨 인덱스의 정중앙이 정확히 180도(6시) 화살표 끝에 오도록 타겟 각도 산출
        const targetDegInCircle = (180 - (res.index * arc - 90 + arc / 2) + 360) % 360;
        const currentMod = currentAbsoluteRotation % 360;
        let distance = (targetDegInCircle - currentMod + 360) % 360;
        
        currentAbsoluteRotation += distance + (360 * 10);
        canvas.style.transition = `transform ${SPIN_DURATION}ms cubic-bezier(0.15, 0, 0.1, 1)`;
        canvas.style.transform = `rotate(${currentAbsoluteRotation}deg)`;
        
        setTimeout(() => resolve(wheelMap[res.index]), SPIN_DURATION);
    }

    function resolve(win) {
        lastResultColor = win.color; // 결과 고정
        document.getElementById('wheelPointer').style.backgroundColor = win.color; 
        globalHistory.push(win.color);
        if(myBet) {
            myGameStats.total++; const winStatus = myBet.type === win.name;
            if(winStatus) { balance += (myBet.amount * win.mult); myGameStats.wins++; playSound('sndWin'); } else playSound('sndLose');
            const row = `<tr><td><span style="color:var(--${myBet.type})">${myBet.type.toUpperCase()}</span></td><td>${myBet.amount.toLocaleString()}</td><td style="color:${winStatus?'var(--accent)':'var(--red)'}">${winStatus ? 'WIN' : 'LOSE'}</td><td><span class="win-dot" style="display:inline-block; width:8px; height:8px; border-radius:50%; background:${win.color}"></span></td></tr>`;
            document.getElementById('myLogBody').insertAdjacentHTML('afterbegin', row);
        }
        updateHistoryUI(); if(currentId !== "GUEST") { let u = JSON.parse(localStorage.getItem('db_users') || '{}'); u[currentId] = { balance: balance }; localStorage.setItem('db_users', JSON.stringify(u)); }
        setTimeout(() => { myBet = null; document.querySelectorAll('.btn').forEach(b => b.classList.remove('selected')); liveBoardTotals = { black:0, red:0, blue:0, gold:0 }; document.querySelectorAll('.bet-list').forEach(l => l.innerHTML = ''); updateBalUI(); }, RESULT_WAIT);
    }

    function getWinIndex(seed) { const rv = (seed * 9301 + 49297) % 233280; return { index: (rv % 56) }; }
    function switchTab(id, el) { document.querySelectorAll('.content-view').forEach(v => v.classList.remove('active')); document.getElementById('view-' + id).classList.add('active'); document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active'); if(id === 'ranking') renderRanking(); if(id === 'recommend') renderStats(); applyI18n(); }
    function handleUserBet(type) { const el = Date.now() % CYCLE_MS; if(el < FREEZE_PERIOD || el > CYCLE_MS - 1000 || myBet) return; const amt = parseInt(document.getElementById('betInput').value); if(amt > balance || amt < 10000) return; balance -= amt; updateBalUI(); myBet = { type, amount: amt }; document.querySelectorAll('.btn').forEach(b => b.classList.remove('selected')); document.getElementById('btn' + type.charAt(0).toUpperCase() + type.slice(1)).classList.add('selected'); addLiveUI(type, "ME", amt); }
    function updateBalUI() { document.getElementById('balance').innerText = balance.toLocaleString(); }
    function adjBet(v) { let input = document.getElementById('betInput'), n = parseInt(input.value) + v; if(n >= 10000) input.value = n; }
    function handleIdInput() { const id = document.getElementById('loginId').value.trim(); const users = JSON.parse(localStorage.getItem('db_users') || '{}'); document.getElementById('pwConfirmGroup').style.display = (id && users[id]) ? 'none' : 'flex'; }
    function handleLoginSubmit() { const id = document.getElementById('loginId').value.trim(), pw = document.getElementById('loginPw').value, pwChk = document.getElementById('loginPwCheck').value, t = i18n[currentLang] || i18n.en; if(!id || pw.length < 6) { document.getElementById('loginMsg').innerText = t.pwRule; return; } let users = JSON.parse(localStorage.getItem('db_users') || '{}'); if(users[id]) { if(users[id].pw === pw) { currentId = id; balance = users[id].balance; updateBalUI(); switchTab('home', document.querySelector('.nav-item')); } else document.getElementById('loginMsg').innerText = "Wrong PW"; } else { if(pw !== pwChk) { document.getElementById('loginMsg').innerText = "Mismatch"; return; } users[id] = { pw, balance: 1000000 }; localStorage.setItem('db_users', JSON.stringify(users)); currentId = id; updateBalUI(); switchTab('home', document.querySelector('.nav-item')); } }
    function initAudio() { audioInitialized = true; }
    function toggleMute() { isMuted = !isMuted; document.getElementById('soundToggle').innerText = isMuted ? "🔇" : "🔊"; }
    function addLiveUI(type, user, amt) { const list = document.getElementById(`l-${type}`); if(!list) return; const item = document.createElement('div'); item.className = 'bet-item'; item.innerHTML = `<span>${user}</span><b>${(amt/1000).toFixed(0)}k</b>`; list.prepend(item); if(list.children.length > 5) list.lastChild.remove(); }

    syncHistory(); drawWheel(); updateBalUI(); applyI18n(); setInterval(tick, 50);
</script>
</body>
</html>
