<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spin4 v5.72 Golden Master</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-top: #1e2128; --bg-bottom: #0e1013;
            --card: #1a1d23; --accent: #00f2ff;
            --gold: #ffcc00; --blue: #00e5ff;
            --red: #ff3333; --black: #444444; 
            --text-muted: #8899aa; --nav-bg: #16191e;
            --point-color: #ff9500; --buy-color: #ff00ff;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100dvh; overflow: hidden; background: #1e2128; color: white; font-family: 'Pretendard', sans-serif; }
        .main-container { width: 100%; max-width: 500px; height: 100%; margin: 0 auto; display: flex; flex-direction: column; position: relative; }

        /* 언어 선택 */
        #langOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.98); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
        .lang-list { display: flex; flex-direction: column; gap: 12px; width: 240px; }
        .lang-btn { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; padding: 18px 20px; border-radius: 12px; font-size: 1rem; font-weight: 700; display: flex; align-items: center; gap: 15px; cursor: pointer; }

        header { padding: 12px 18px; background: rgba(0,0,0,0.4); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .user-id { font-size: 0.8rem; font-weight: 700; border-left: 3px solid var(--accent); padding-left: 10px; }
        .balance-box { background: rgba(255, 149, 0, 0.05); padding: 5px 10px; border-radius: 6px; border: 1px solid var(--point-color); color: var(--point-color); font-weight: 800; font-size: 0.85rem; }

        /* 히스토리 바 */
        .rolls-wrapper { width: 100%; padding: 10px 15px; background: rgba(0,0,0,0.2); border-bottom: 1px solid #333; }
        .history-strip { display: flex; gap: 3px; height: 45px; align-items: flex-start; overflow: hidden; }
        .hist-bar { width: 4px; border-radius: 1px; flex-shrink: 0; }
        .hist-bar.black-bar { height: 18px; }
        .hist-bar.red-bar { height: 26px; }
        .hist-bar.blue-bar { height: 34px; }
        .hist-bar.gold-bar { height: 42px; box-shadow: 0 0 10px var(--gold); }

        .timer-container { width: 100%; height: 6px; background: #000; position: relative; }
        #timerBar { position: absolute; left: 0; top: 0; height: 100%; width: 0%; transition: width 0.1s linear; }

        .content-view { flex: 1; overflow-y: auto; display: none; padding-bottom: 90px; width: 100%; }
        .content-view.active { display: flex; flex-direction: column; align-items: center; }

        /* 휠 섹션 (v5.49 화살표 위치 복구) */
        .wheel-section { position: relative; margin: 25px 0; width: 230px; height: 230px; }
        #wheelCanvas { width: 100%; height: 100%; border-radius: 50%; }
        /* 화살표 위치를 다시 상단(12시)으로 이동 */
        .pointer { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); width: 20px; height: 24px; background: #fff; clip-path: polygon(0% 0%, 100% 0%, 50% 100%); z-index: 30; border: 2.5px solid #000; }
        .wheel-logo { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; font-weight: 900; font-size: 1.8rem; color: var(--accent); opacity: 0.8; }

        .overlay-container { width: 100%; padding: 0 15px; position: relative; }
        .controls { width: 100%; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #333; }
        
        /* 배팅 입력창 (작은 화살표 복구) */
        #betInput {
            width: 100%; background: #000; border: 1px solid #444; color: var(--accent); 
            padding: 12px; border-radius: 8px; text-align: center; font-weight: 900; font-size: 1.1rem;
            display: block;
        }

        .bet-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 12px; }
        .btn { height: 60px; background: transparent; border: 1.5px solid transparent; border-radius: 4px; font-weight: 900; font-size: 1rem; color: #fff; cursor: pointer; }
        .btn-black { border-color: #555; color: #777; } 
        .btn-red { border-color: var(--red); color: var(--red); }
        .btn-blue { border-color: var(--blue); color: var(--blue); } 
        .btn-gold { border-color: var(--gold); color: var(--gold); }
        
        .btn.selected.btn-black { background: #333; color: #fff; }
        .btn.selected.btn-red { background: var(--red); color: #000; } /* 레드 선택 시 검정 글자 */
        .btn.selected.btn-blue { background: var(--blue); color: #000; }
        .btn.selected.btn-gold { background: var(--gold); color: #000; }

        /* 하단 메뉴 */
        nav { position: fixed; bottom: 0; width: 100%; max-width: 500px; height: 75px; background: var(--nav-bg); display: flex; border-top: 1px solid #222; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); font-size: 0.7rem; font-weight: 700; }
        .nav-item.active { color: var(--accent); }
        .nav-icon { font-size: 1.2rem; margin-bottom: 3px; }

        /* 로그인 UI (v5.49 복구) */
        .login-box { width: 90%; padding: 30px 20px; background: var(--card); border-radius: 15px; border: 1px solid #333; margin-top: 40px; }
        .login-input { width: 100%; padding: 15px; background: #000; border: 1px solid #333; color: #fff; margin-bottom: 12px; border-radius: 8px; outline: none; font-size: 1rem; }
        .login-btn { width: 100%; padding: 16px; background: var(--gold); color: #000; border: none; border-radius: 8px; font-weight: 900; font-size: 1.1rem; cursor: pointer; }

        /* 라이브 배팅 및 테이블 */
        .live-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; width: 100%; margin-top: 15px; }
        .live-col { background: rgba(0,0,0,0.4); border-radius: 8px; min-height: 100px; border-top: 3px solid #444; padding: 5px; }
        .log-table { width: 95%; border-collapse: collapse; font-size: 0.7rem; margin-top: 20px; background: rgba(0,0,0,0.3); }
        .log-table th { padding: 10px; border-bottom: 1px solid #333; color: var(--text-muted); }
        .log-table td { padding: 10px; text-align: center; border-bottom: 1px solid #222; }

        .closed-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); display:none; align-items:center; justify-content:center; z-index:50; border-radius:12px; }
        .closed-text { font-weight: 900; font-size: 1.5rem; color: #fff; letter-spacing: 2px; }

        .version-info { font-size: 0.6rem; color: #444; margin: 20px 0; text-align: center; }
    </style>
</head>
<body onclick="initAudio()">

<div id="langOverlay">
    <div class="lang-list">
        <div class="lang-btn" onclick="setLanguage('en')">🇺🇸 English</div>
        <div class="lang-btn" onclick="setLanguage('cn')">🇨🇳 简体中文</div>
        <div class="lang-btn" onclick="setLanguage('jp')">🇯🇵 日本語</div>
        <div class="lang-btn" onclick="setLanguage('ko')">🇰🇷 한국어</div>
    </div>
</div>

<div class="main-container">
    <header>
        <div class="user-id" id="displayId">GUEST</div>
        <div style="display:flex; gap:10px; align-items:center;">
            <div class="balance-box"><span id="balance">1,000,000</span> P</div>
            <button onclick="switchTab('wallet', document.getElementById('nav-wallet'))" style="background:var(--buy-color); border:none; color:white; border-radius:4px; padding:4px 8px; font-weight:800; font-size:0.7rem;">BUY</button>
        </div>
    </header>

    <div class="rolls-wrapper"><div id="historyStrip" class="history-strip"></div></div>
    <div class="timer-container"><div id="timerBar"></div></div>

    <div id="view-home" class="content-view active">
        <div class="wheel-section">
            <div class="pointer" id="wheelPointer"></div>
            <canvas id="wheelCanvas" width="560" height="560"></canvas>
            <div class="wheel-logo">Spin4</div>
        </div>
        <div class="overlay-container">
            <div id="betOverlay" class="closed-overlay"><div class="closed-text" id="closedTxt">CLOSED</div></div>
            <div class="controls">
                <input type="number" id="betInput" value="10000" step="10000" min="10000">
                <div class="bet-buttons">
                    <button class="btn btn-black" onclick="handleUserBet('black')" id="btnBlack">2x</button>
                    <button class="btn btn-red" onclick="handleUserBet('red')" id="btnRed">3x</button>
                    <button class="btn btn-blue" onclick="handleUserBet('blue')" id="btnBlue">5x</button>
                    <button class="btn btn-gold" onclick="handleUserBet('gold')" id="btnGold">50x</button>
                </div>
            </div>
            <div class="live-grid">
                <div class="live-col" style="border-color:var(--black);"><div id="l-black"></div></div>
                <div class="live-col" style="border-color:var(--red);"><div id="l-red"></div></div>
                <div class="live-col" style="border-color:var(--blue);"><div id="l-blue"></div></div>
                <div class="live-col" style="border-color:var(--gold);"><div id="l-gold"></div></div>
            </div>
        </div>
        <table class="log-table">
            <thead><tr><th id="th-pick">Pick</th><th id="th-bet">Bet</th><th id="th-res">Result</th></tr></thead>
            <tbody id="myLogBody"></tbody>
        </table>
    </div>

    <div id="view-wallet" class="content-view">
        <div style="padding:40px 20px; text-align:center; width:100%;">
            <h2 style="color:var(--accent);">WALLET</h2>
            <div style="background:var(--card); padding:20px; border-radius:12px; border:1px solid #333;">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><span>TON</span><button style="background:#0088cc; border:none; color:white; padding:5px 10px; border-radius:4px;">Deposit</button></div>
                <div style="display:flex; justify-content:space-between;"><span>USDT</span><button style="background:#26a17b; border:none; color:white; padding:5px 10px; border-radius:4px;">Deposit</button></div>
            </div>
        </div>
    </div>

    <div id="view-ranking" class="content-view">
        <h3 id="rankTitle" style="margin-top:20px; color:var(--gold);">TOP 100 RANKING</h3>
        <table class="log-table" style="width:95%;" id="rankTable"></table>
    </div>

    <div id="view-how" class="content-view">
        <div id="howContent" style="padding:20px; line-height:1.6; font-size:0.9rem;"></div>
    </div>

    <div id="view-recommend" class="content-view">
        <h3 style="margin-top:20px; color:var(--accent);">STATISTICS</h3>
        <div id="statsDash" style="width:90%; background:var(--card); padding:20px; border-radius:12px; margin-top:10px;"></div>
        <div class="version-info">v5.72 Golden Master | Physical Engine v2.0</div>
    </div>

    <div id="view-login" class="content-view">
        <div class="login-box">
            <h2 style="text-align:center; margin-bottom:25px;" id="loginTitle">LOGIN</h2>
            <input type="text" id="loginId" class="login-input" placeholder="USER ID" oninput="handleIdInput()">
            <input type="password" id="loginPw" class="login-input" placeholder="PASSWORD">
            <div id="pwConfirmGroup"><input type="password" id="loginPwCheck" class="login-input" placeholder="CONFIRM PASSWORD"></div>
            <button class="login-btn" onclick="handleLoginSubmit()" id="loginSubmitBtn">GO</button>
            <div id="logoutSection" style="display:none; text-align:center;">
                <p id="welcomeMsg"></p>
                <button class="login-btn" style="background:var(--red); color:white;" onclick="handleLogout()">LOGOUT</button>
            </div>
        </div>
    </div>

    <nav>
        <div class="nav-item active" onclick="switchTab('home', this)"><div class="nav-icon">🏠</div><span id="navHome">홈</span></div>
        <div class="nav-item" id="nav-wallet" onclick="switchTab('wallet', this)"><div class="nav-icon">👛</div><span id="navWallet">지갑</span></div>
        <div class="nav-item" onclick="switchTab('ranking', this)"><div class="nav-icon">🏆</div><span id="navRank">랭킹</span></div>
        <div class="nav-item" onclick="switchTab('how', this)"><div class="nav-icon">❓</div><span id="navHow">사용법</span></div>
        <div class="nav-item" onclick="switchTab('recommend', this)"><div class="nav-icon">📈</div><span id="navStats">통계</span></div>
        <div class="nav-item" onclick="switchTab('login', this)"><div class="nav-icon">👤</div><span id="navLogin">로그인</span></div>
    </nav>
</div>

<audio id="sndTick" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

<script>
    const tg = window.Telegram.WebApp; tg.expand();
    let currentLang = 'en', currentId = "GUEST", balance = 1000000, lastRotation = 0;
    let isSpinning = false, myBet = null, globalHistory = [], myGameStats = { total: 0, wins: 0 };

    const sectors = [{color:'#ffcc00', name:'gold', mult:50, weight: 1},{color:'#00e5ff', name:'blue', mult:5, weight: 10},{color:'#ff3333', name:'red', mult:3, weight: 17},{color:'#444444', name:'black', mult:2, weight: 28}];
    const wheelMap = []; sectors.forEach(s => { for(let i=0; i<s.weight; i++) wheelMap.push(s); });
    
    const i18n = {
        ko: { home: "홈", wallet: "지갑", rank: "랭킹", how: "사용법", stats: "통계", login: "로그인", closed: "마감", pick: "선택", bet: "금액", res: "결과" },
        en: { home: "Home", wallet: "Wallet", rank: "Rank", how: "How", stats: "Stats", login: "Login", closed: "CLOSED", pick: "Pick", bet: "Bet", res: "Res" }
    };

    const CYCLE_MS = 20000, SPIN_DURATION = 6500, FREEZE = 9000;
    const canvas = document.getElementById('wheelCanvas'), ctx = canvas.getContext('2d');

    function setLanguage(lang) { currentLang = lang; document.getElementById('langOverlay').style.display = 'none'; applyI18n(); }
    function applyI18n() {
        const t = i18n[currentLang] || i18n.en;
        document.getElementById('navHome').innerText = t.home; document.getElementById('navWallet').innerText = t.wallet;
        document.getElementById('navRank').innerText = t.rank; document.getElementById('navHow').innerText = t.how;
        document.getElementById('navStats').innerText = t.stats; document.getElementById('navLogin').innerText = t.login;
        document.getElementById('closedTxt').innerText = t.closed;
    }

    function drawWheel() {
        const arc = (Math.PI * 2) / 56; ctx.clearRect(0,0,560,560); ctx.lineWidth = 14; 
        for (let i = 0; i < 56; i++) {
            ctx.beginPath(); ctx.strokeStyle = wheelMap[i].color;
            // Index 0이 12시(-90도)에 오도록 그림
            ctx.arc(280, 280, 260, i * arc - Math.PI/2, (i + 1) * arc - Math.PI/2); ctx.stroke();
        }
    }

    function tick() {
        const now = Date.now(), elapsed = now % CYCLE_MS;
        const pointer = document.getElementById('wheelPointer');
        if (elapsed < FREEZE) {
            document.getElementById('betOverlay').style.display = "flex";
            if (elapsed < 200 && !isSpinning) startSpin();
            if(isSpinning) {
                const rot = getCurrentRotation(), arc = 360 / 56;
                // 상단 12시(-90도) 기준 물리 색상 판정
                const physicalPos = (360 - (rot % 360)) % 360;
                const idx = Math.floor(physicalPos / arc) % 56;
                pointer.style.borderTopColor = wheelMap[idx].color;
            }
        } else {
            isSpinning = false;
            document.getElementById('betOverlay').style.display = "none";
            const rem = CYCLE_MS - elapsed;
            document.getElementById('timerBar').style.width = (rem / (CYCLE_MS - FREEZE)) * 100 + "%";
            pointer.style.borderTopColor = "#fff";
        }
    }

    function getCurrentRotation() {
        const st = window.getComputedStyle(canvas), tr = st.getPropertyValue("transform");
        if(tr === "none") return lastRotation;
        const v = tr.split('(')[1].split(')')[0].split(',');
        return (Math.round(Math.atan2(parseFloat(v[1]), parseFloat(v[0])) * (180/Math.PI)) + 360) % 360;
    }

    function startSpin() {
        isSpinning = true;
        const seed = Math.floor(Date.now() / CYCLE_MS);
        const rv = (seed * 9301 + 49297) % 233280;
        const winIdx = rv % 56;
        const arc = 360 / 56;
        // 12시 상단 기준: winIdx가 0도 위치로 오게 함
        const targetDeg = (360 - (winIdx * arc + arc/2)) + (360 * 8); 
        canvas.style.transition = `transform ${SPIN_DURATION}ms cubic-bezier(0.1, 0, 0.05, 1)`;
        canvas.style.transform = `rotate(${targetDeg}deg)`;
        lastRotation = targetDeg;
        setTimeout(() => resolve(wheelMap[winIdx]), SPIN_DURATION);
    }

    function resolve(win) {
        if(myBet) {
            const isWin = myBet.type === win.name;
            if(isWin) balance += (myBet.amount * win.mult);
            const row = `<tr><td>${myBet.type.toUpperCase()}</td><td>${myBet.amount}</td><td style="color:${win.color}">${win.name.toUpperCase()}</td></tr>`;
            document.getElementById('myLogBody').insertAdjacentHTML('afterbegin', row);
        }
        myBet = null;
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('selected'));
        updateBalUI();
    }

    function handleUserBet(type) {
        const el = Date.now() % CYCLE_MS; if(el < FREEZE || myBet) return;
        const amt = parseInt(document.getElementById('betInput').value);
        if(amt > balance) return;
        balance -= amt; updateBalUI();
        myBet = { type, amount: amt };
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('selected'));
        document.getElementById('btn' + type.charAt(0).toUpperCase() + type.slice(1)).classList.add('selected');
    }

    function updateBalUI() { document.getElementById('balance').innerText = balance.toLocaleString(); }
    
    function switchTab(id, el) {
        document.querySelectorAll('.content-view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    // 로그인 로직 (v5.49 복구)
    function handleIdInput() {
        const id = document.getElementById('loginId').value;
        const users = JSON.parse(localStorage.getItem('db_users') || '{}');
        document.getElementById('pwConfirmGroup').style.display = users[id] ? 'none' : 'block';
    }

    function handleLoginSubmit() {
        const id = document.getElementById('loginId').value;
        const pw = document.getElementById('loginPw').value;
        if(!id || pw.length < 4) return;
        let users = JSON.parse(localStorage.getItem('db_users') || '{}');
        if(users[id]) {
            if(users[id].pw === pw) loginSuccess(id, users[id].balance);
            else alert('Wrong PW');
        } else {
            users[id] = { pw, balance: 1000000 };
            localStorage.setItem('db_users', JSON.stringify(users));
            loginSuccess(id, 1000000);
        }
    }

    function loginSuccess(id, bal) {
        currentId = id; balance = bal;
        document.getElementById('displayId').innerText = id;
        document.getElementById('loginId').style.display = 'none';
        document.getElementById('loginPw').style.display = 'none';
        document.getElementById('pwConfirmGroup').style.display = 'none';
        document.getElementById('loginSubmitBtn').style.display = 'none';
        document.getElementById('logoutSection').style.display = 'block';
        document.getElementById('welcomeMsg').innerText = "Welcome, " + id;
        updateBalUI();
    }

    function handleLogout() { location.reload(); }
    function initAudio() {}

    drawWheel(); updateBalUI(); applyI18n(); setInterval(tick, 100);
</script>
</body>
</html>
