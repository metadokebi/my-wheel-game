        cn: { welcome: "欢迎", buy: "购买", closed: "已截止", live: "实时投注", home: "首页", how: "指南", stats: "统计", login: "登录", logout: "登出", pick: "选择", bet: "赌注", res: "结果", win: "赢家", pwRule: "密码：6位以上。", loginFail: "ID或密码错误", pwMismatch: "密码不匹配", joinSuccess: "注册成功！", btnLogin: "登录", btnJoin: "注册", idPlaceholder: "电报 ID", pwPlaceholder: "密码", pwChkPlaceholder: "确认密码", langTitle: "选择语言", globalTrend: "全球同步", trendDesc: "实时数据同步中。", totalSpins: "局数", winRate: "胜率", prevRolls: "历史记录", last100: "最近100次",
              howTxt: `<div class="how-card"><div class="how-section"><div class="how-title">简介</div><div class="how-text">基于精密算法的实时多人轮盘游戏。</div></div></div>` },
        jp: { welcome: "ようこそ", buy: "購入", closed: "締切", live: "ライブ状況", home: "ホーム", how: "遊び方", stats: "統計", login: "ログイン", logout: "ログアウト", pick: "選択", bet: "ベット", res: "結果", win: "当選者", pwRule: "英数字+記号 6文字以上。", loginFail: "ログインミス", pwMismatch: "パス不一致", joinSuccess: "成功！", btnLogin: "ログイン", btnJoin: "新規登録", idPlaceholder: "テレ ID", pwPlaceholder: "パスワード", pwChkPlaceholder: "パス確認", langTitle: "言語選択", globalTrend: "同期済み", trendDesc: "リアルタイムデータ同期中。", totalSpins: "総回転数", winRate: "勝率", prevRolls: "前回結果", last100: "直近100回",
              howTxt: `<div class="how-card"><div class="how-section"><div class="how-title">紹介</div><div class="how-text">リアルタイムマルチプレイヤー・ホイールゲーム。</div></div></div>` }
    };

    const CYCLE_MS = 20000, SPIN_DURATION = 6500, RESULT_WAIT = 2000, FREEZE_PERIOD = SPIN_DURATION + RESULT_WAIT, BETTING_PERIOD = CYCLE_MS - FREEZE_PERIOD;
    const canvas = document.getElementById('wheelCanvas'), ctx = canvas.getContext('2d'), timerBar = document.getElementById('timerBar'), betOverlay = document.getElementById('betOverlay');

    function setLanguage(lang) { currentLang = lang; localStorage.setItem('db_wheel_lang', lang); document.getElementById('langOverlay').style.display = 'none'; applyI18n(); }

    function applyI18n() {
        const t = i18n[currentLang] || i18n.en;
        document.getElementById('displayId').innerText = `${t.welcome} ${currentId}`;
        document.getElementById('btnBuyTop').innerText = t.buy; document.getElementById('closedTxt').innerText = t.closed;
        document.getElementById('liveTitle').innerText = t.live; document.getElementById('navHome').innerText = t.home; 
        document.getElementById('navHow').innerText = t.how; document.getElementById('navStats').innerText = t.stats; 
        document.getElementById('navLogin').innerText = (currentId === "GUEST") ? t.login : t.logout;
        document.getElementById('th-pick').innerText = t.pick; document.getElementById('th-bet').innerText = t.bet;
        document.getElementById('th-res').innerText = t.res; document.getElementById('th-win').innerText = t.win;
        document.getElementById('lblGlobalTrend').innerText = t.globalTrend; document.getElementById('lblTrendDesc').innerText = t.trendDesc;
        document.getElementById('lbl-total').innerText = t.totalSpins; document.getElementById('lbl-winrate').innerText = t.winRate;
        document.getElementById('langSelTitle').innerText = t.langTitle;
        document.getElementById('loginId').placeholder = t.idPlaceholder; document.getElementById('loginPw').placeholder = t.pwPlaceholder;
        document.getElementById('loginPwCheck').placeholder = t.pwChkPlaceholder;
        document.getElementById('lblPreviousRolls').innerText = t.prevRolls; document.getElementById('lblLast100').innerText = t.last100;
        document.getElementById('cl1').innerText = currentLang === 'ko' ? "블랙" : "BLACK"; document.getElementById('cl2').innerText = currentLang === 'ko' ? "레드" : "RED";
        document.getElementById('cl3').innerText = currentLang === 'ko' ? "블루" : "BLUE"; document.getElementById('cl4').innerText = currentLang === 'ko' ? "골드" : "GOLD";
        document.getElementById('howContent').innerHTML = t.howTxt;
        handleIdInput(); 
    }

    function updateHistoryUI() {
        const strip = document.getElementById('historyStrip'); strip.innerHTML = '';
        const counts = { black: 0, red: 0, blue: 0, gold: 0 };
        const reversedData = [...globalHistory].slice(-100).reverse();
        reversedData.forEach((color, idx) => {
            if(color === '#444444') counts.black++; else if(color === '#ff3333') counts.red++;
            else if(color === '#00e5ff') counts.blue++; else if(color === '#ffcc00') counts.gold++;
            if(idx < 55) {
                const bar = document.createElement('div');
                bar.className = 'hist-bar ' + (color === '#ffcc00' ? 'gold-bar' : 'normal');
                bar.style.backgroundColor = color; strip.appendChild(bar);
            }
        });
        document.getElementById('st-count-black').innerText = counts.black; document.getElementById('st-count-red').innerText = counts.red;
        document.getElementById('st-count-blue').innerText = counts.blue; document.getElementById('st-count-gold').innerText = counts.gold;
    }

    function syncHistory() {
        const seed = Math.floor(Date.now() / CYCLE_MS); globalHistory = [];
        for(let i=1; i<=100; i++) { globalHistory.push(wheelMap[getWinIndex(seed - i).index].color); }
        updateHistoryUI();
    }

    function handleIdInput() {
        const id = document.getElementById('loginId').value.trim();
        const users = JSON.parse(localStorage.getItem('db_users') || '{}');
        const pwConfirmGroup = document.getElementById('pwConfirmGroup');
        const btn = document.getElementById('btnLoginBtn');
        const t = i18n[currentLang] || i18n.en;
        if(id && users[id]) { pwConfirmGroup.style.display = 'none'; btn.innerText = t.btnLogin; } 
        else { pwConfirmGroup.style.display = 'flex'; btn.innerText = t.btnJoin; }
    }

    function handleLoginSubmit() {
        const id = document.getElementById('loginId').value.trim();
        const pw = document.getElementById('loginPw').value;
        const pwChk = document.getElementById('loginPwCheck').value;
        const t = i18n[currentLang] || i18n.en;
        if(!id || pw.length < 6) { document.getElementById('loginMsg').innerText = t.pwRule; return; }
        let users = JSON.parse(localStorage.getItem('db_users') || '{}');
        if(users[id]) {
            if(users[id].pw === pw) { currentId = id; balance = users[id].balance; myGameStats = users[id].myGameStats; sessionStorage.setItem('loggedInUser', id); updateLoginState(true); }
            else { document.getElementById('loginMsg').innerText = t.loginFail; }
        } else {
            if(pw !== pwChk) { document.getElementById('loginMsg').innerText = t.pwMismatch; return; }
            users[id] = { pw: pw, balance: 1000000, myGameStats: { total: 0, wins: 0 } };
            localStorage.setItem('db_users', JSON.stringify(users));
            currentId = id; sessionStorage.setItem('loggedInUser', id); alert(t.joinSuccess); updateLoginState(true);
        }
    }

    function handleLogout() { sessionStorage.removeItem('loggedInUser'); currentId = "GUEST"; balance = 1000000; myGameStats = { total: 0, wins: 0 }; updateLoginState(false); switchTab('home', document.querySelector('.nav-item')); }
    function updateLoginState(isLogged) { document.getElementById('loginForm').style.display = isLogged ? 'none' : 'flex'; document.getElementById('logoutForm').style.display = isLogged ? 'block' : 'none'; applyI18n(); updateBalUI(); }
    function checkSession() { const sUser = sessionStorage.getItem('loggedInUser'); if(sUser) { let users = JSON.parse(localStorage.getItem('db_users') || '{}'); if(users[sUser]) { currentId = sUser; balance = users[sUser].balance; myGameStats = users[sUser].myGameStats; updateLoginState(true); } } }
    function initTelegramUser() { const user = tg.initDataUnsafe?.user; if(user && (user.username || user.first_name)) { document.getElementById('loginId').value = user.username || user.first_name; handleIdInput(); } }

    function drawWheel() {
        const arc = (Math.PI * 2) / 56; const radius = 260; 
        ctx.clearRect(0,0,560,560); ctx.lineWidth = 14; 
        for (let i = 0; i < 56; i++) {
            ctx.beginPath(); ctx.strokeStyle = wheelMap[i].color;
            ctx.arc(280, 280, radius, i * arc + 0.02, (i + 1) * arc - 0.02); ctx.stroke();
        }
    }

    /* --- 물리 동기화 감지 (270도 하단 타겟) --- */
    function tick() {
        const now = Date.now(), elapsed = now % CYCLE_MS;
        const pointer = document.getElementById('wheelPointer');
        if (elapsed < FREEZE_PERIOD) {
            timerBar.style.width = "0%"; betOverlay.style.display = "flex";
            if (elapsed < 200 && !isSpinning) startSpin();
            if(isSpinning) {
                const rotation = getCurrentRotation();
                // 270도 지점의 색상 정확하게 트래킹
                const arc = 360 / 56;
                const index = Math.floor(((270 - rotation) % 360 + 360) % 360 / arc) % 56;
                pointer.style.backgroundColor = wheelMap[index].color;
            }
        } else {
            isSpinning = false; const remaining = CYCLE_MS - elapsed;
            timerBar.style.width = (remaining / BETTING_PERIOD) * 100 + "%";
            timerBar.style.backgroundColor = `hsl(${(remaining / BETTING_PERIOD) * 60}, 100%, 50%)`;
            betOverlay.style.display = (remaining < 1000) ? "flex" : "none";
            pointer.style.backgroundColor = "#fff"; 
            if(now % 1000 < 100) deterministicGlobalSpawn(); 
        }
    }

    function getCurrentRotation() {
        const st = window.getComputedStyle(canvas, null); const tr = st.getPropertyValue("transform");
        if(tr === "none") return 0;
        const values = tr.split('(')[1].split(')')[0].split(',');
        const a = parseFloat(values[0]), b = parseFloat(values[1]);
        let angle = Math.round(Math.atan2(b, a) * (180/Math.PI));
        return (angle + 360) % 360;
    }

    function startSpin() {
        isSpinning = true; const res = getWinIndex(Math.floor(Date.now() / CYCLE_MS));
        canvas.style.transition = `transform ${SPIN_DURATION}ms cubic-bezier(0.15, 0, 0.1, 1)`;
        canvas.style.transform = `rotate(${res.degrees}deg)`;
        let tC = 0; const tI = setInterval(() => { if(tC < 35 && isSpinning) { playSound('sndTick'); tC++; } else clearInterval(tI); }, 180);
        setTimeout(() => resolve(wheelMap[res.index]), SPIN_DURATION);
    }

    function resolve(win) {
        document.getElementById('wheelPointer').style.backgroundColor = win.color;
        globalHistory.push(win.color);
        if(myBet) {
            myGameStats.total++; const winStatus = myBet.type === win.name;
            if(winStatus) { balance += (myBet.amount * win.mult); myGameStats.wins++; playSound('sndWin'); } else playSound('sndLose');
            const row = `<tr><td>${myBet.type.toUpperCase()}</td><td>${myBet.amount.toLocaleString()}</td><td>${winStatus ? 'Win' : 'Lost'}</td><td><span class="winner-dot" style="background:${win.color}"></span></td></tr>`;
            document.getElementById('myLogBody').insertAdjacentHTML('afterbegin', row);
        }
        updateHistoryUI(); 
        if(currentId !== "GUEST") {
            let users = JSON.parse(localStorage.getItem('db_users') || '{}');
            users[currentId].balance = balance; users[currentId].myGameStats = myGameStats;
            localStorage.setItem('db_users', JSON.stringify(users));
        }
        setTimeout(() => {
            myBet = null; document.querySelectorAll('.bet-buttons .btn').forEach(b => b.classList.remove('selected'));
            liveBoardTotals = { black:0, red:0, blue:0, gold:0 }; document.querySelectorAll('.bet-list').forEach(l => l.innerHTML = '');
            canvas.style.transition = 'none'; canvas.style.transform = 'rotate(0deg)'; updateBalUI();
        }, RESULT_WAIT);
    }

    /* --- [핵심] 당첨 칸의 "정중앙"이 화살표(270도)에 오도록 보정 --- */
    function getWinIndex(seed) { 
        const rv = (seed * 9301 + 49297) % 233280;
        const targetIdx = (rv % 56);
        const arc = 360 / 56;
        // 270도(하단 포인터) - (당첨칸 각도 + 칸의 절반) = 최종적으로 휠을 돌려야 할 각도
        // 이 공식은 화살표 끝이 해당 슬롯의 정중앙에 정확히 멈추게 함.
        const targetDeg = (270 - (targetIdx * arc + arc / 2) + 360) % 360;
        return { index: targetIdx, degrees: targetDeg + (360 * 10) }; 
    }
    
    function switchTab(id, el) {
        document.querySelectorAll('.content-view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active');
        if(id === 'login') initTelegramUser();
    }
    
    function handleUserBet(type) { 
        const elapsed = Date.now() % CYCLE_MS; if(elapsed < FREEZE_PERIOD || elapsed > CYCLE_MS - 1000 || myBet) return; 
        const amt = parseInt(document.getElementById('betInput').value); if(amt > balance || amt < 10000) return; 
        balance -= amt; updateBalUI(); myBet = { type, amount: amt }; 
        document.querySelectorAll('.bet-buttons .btn').forEach(b => b.classList.remove('selected'));
        document.getElementById('btn' + type.charAt(0).toUpperCase() + type.slice(1)).classList.add('selected');
        addLiveUI(type, "ME", amt); 
    }
    function updateBalUI() { document.getElementById('balance').innerText = balance.toLocaleString(); }
    function adjBet(v) { let input = document.getElementById('betInput'), n = parseInt(input.value) + v; if(n >= 10000) input.value = n; }
    function initAudio() { audioInitialized = true; }
    function toggleMute() { isMuted = !isMuted; document.getElementById('soundToggle').innerText = isMuted ? "🔇" : "🔊"; }
    function playSound(id) { if(!isMuted && audioInitialized) { const s = document.getElementById(id); s.currentTime = 0; s.play().catch(()=>{}); } }
    
    function deterministicGlobalSpawn() {
        const now = Date.now(); const tSeed = Math.floor(now / 1000), rand = (tSeed * 9301 + 49297) % 233280;
        if((rand % 100) < 28) { 
            const botId = ["LuckyTop", "WinStar", "ProAce", "VipKing"][rand % 4] + (rand % 99);
            const type = (rand % 100) < 40 ? 'black' : ((rand % 100) < 75 ? 'red' : ((rand % 100) < 95 ? 'blue' : 'gold'));
            addLiveUI(type, botId, (Math.floor(rand % 15) + 1) * 10000); 
        }
    }
    function addLiveUI(type, user, amt) {
        const list = document.getElementById(`l-${type}`); if(!list) return;
        if([...list.querySelectorAll('span')].some(s => s.innerText === user)) return;
        liveBoardTotals[type] += amt; document.getElementById(`t-${type}`).innerText = liveBoardTotals[type].toLocaleString();
        const item = document.createElement('div'); item.className = 'bet-item';
        item.innerHTML = `<span>${user}</span><b>${(amt/1000).toFixed(0)}k</b>`;
        list.prepend(item); if(list.children.length > 5) list.lastChild.remove();
    }

    checkSession(); syncHistory(); drawWheel(); updateBalUI(); applyI18n(); setInterval(tick, 100);
</script>
</body>
