<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spin4 v6.8 Golden Master</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-top: #1e2128; --bg-bottom: #0e1013;
            --card: #1a1d23; --accent: #00f2ff;
            --gold: #ffcc00; --blue: #00e5ff;
            --red: #ff3333; --black: #222222; 
            --text-muted: #8899aa; --nav-bg: #16191e;
            --point-color: #ff9500; --buy-color: #ff00ff;
            --ton-blue: #0088cc;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100dvh; overflow: hidden; background: radial-gradient(circle at center, var(--bg-top) 0%, var(--bg-bottom) 100%); color: white; font-family: 'Pretendard', sans-serif; }
        .main-container { width: 100%; max-width: 500px; height: 100%; margin: 0 auto; display: flex; flex-direction: column; position: relative; overflow-x: hidden; }

        /* [v5.8 이식] Transparent Glass Overlay */
        #langOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); z-index: 5000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .lang-list { display: flex; flex-direction: column; gap: 12px; width: 220px; }
        .lang-btn { background: rgba(0, 0, 0, 0.7); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; padding: 15px 25px; border-radius: 12px; font-size: 0.95rem; font-weight: 700; display: flex; align-items: center; gap: 15px; cursor: pointer; }

        header { padding: 12px 18px; background: rgba(0,0,0,0.4); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .user-id { font-size: 0.8rem; font-weight: 700; border-left: 3px solid var(--accent); padding-left: 10px; }
        .balance-box { background: rgba(255, 149, 0, 0.05); padding: 5px 10px; border-radius: 6px; border: 1px solid var(--point-color); color: var(--point-color); font-weight: 800; font-size: 0.85rem; }

        /* 히스토리 바 (가변 높이 이미지 사양) */
        .rolls-wrapper { width: 100%; padding: 15px 0; background: rgba(0,0,0,0.2); border-bottom: 1px solid #333; flex-shrink: 0; display: flex; justify-content: center; }
        .history-strip { display: flex; gap: 4px; height: 45px; align-items: flex-start; overflow: hidden; }
        .hist-bar { width: 4px; border-radius: 10px; flex-shrink: 0; transition: all 0.3s ease; }
        .hist-bar.h-black { height: 18px; opacity: 0.6; }
        .hist-bar.h-red { height: 26px; opacity: 0.8; }
        .hist-bar.h-blue { height: 34px; opacity: 0.9; }
        .hist-bar.h-gold { height: 42px; box-shadow: 0 0 12px var(--gold); z-index: 5; }

        .timer-container { width: 100%; height: 6px; background: #000; position: relative; flex-shrink: 0; }
        #timerBar { position: absolute; left: 0; top: 0; height: 100%; width: 0%; transition: width 0.1s linear; }

        .content-view { flex: 1; overflow-y: auto; display: none; padding-bottom: 90px; width: 100%; align-items: center; }
        .content-view.active { display: flex; flex-direction: column; }

        /* [v5.8 이식] 물리 엔진 휠 정렬 */
        .wheel-section { position: relative; margin: 25px 0; width: 240px; height: 240px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        #wheelCanvas { width: 100%; height: 100%; border-radius: 50%; }
        .wheel-logo { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; font-weight: 900; font-size: 2rem; color: #fff; text-shadow: 0 0 15px var(--accent); pointer-events: none; }
        .pointer { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); width: 16px; height: 24px; background: #fff; clip-path: polygon(0 0, 100% 0, 50% 100%); z-index: 25; transition: background-color 0.05s linear; }

        /* 와이드 레이아웃 */
        .overlay-container { width: 100%; padding: 0 15px; position: relative; }
        .controls { width: 100%; background: var(--card); padding: 12px; border-radius: 12px; border: 1px solid #333; }
        #betInput { flex: 1; background: #000; border: 1px solid #333; color: var(--accent); padding: 12px; border-radius: 8px; text-align: center; font-weight: 900; outline: none; }
        .bet-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 12px; }
        .btn { height: 50px; border: none; border-radius: 8px; font-weight: 900; font-size: 0.65rem; color: #fff; cursor: pointer; }
        .btn-black { background: var(--black); } .btn-red { background: var(--red); }
        .btn.selected.btn-red { color: #000 !important; box-shadow: 0 0 15px var(--red); }
        .btn-blue { background: var(--blue); color: #000; } .btn-gold { background: var(--gold); color: #000; }

        /* 라이브 배팅 그리드 */
        .live-betting-area { width: 100%; margin-top: 10px; padding: 10px; background: rgba(255,255,255,0.02); border-radius: 12px; border: 1px solid #333; }
        .live-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
        .live-col { background: rgba(0,0,0,0.4); border-radius: 8px; min-height: 100px; border-top: 3px solid #444; overflow: hidden; display: flex; flex-direction: column; }
        .col-head { padding: 4px; text-align: center; font-size: 0.5rem; font-weight: 900; color: var(--text-muted); }
        .col-total { font-size: 0.55rem; color: var(--accent); display: block; }
        .bet-list { padding: 2px; flex: 1; display: flex; flex-direction: column; gap: 2px; }
        .bet-item { display: flex; justify-content: space-between; font-size: 0.42rem; background: rgba(255,255,255,0.05); padding: 2px; border-radius: 2px; }

        /* 지갑 & 카드 UI */
        .wallet-card { width: 94%; background: linear-gradient(135deg, #1a1d23 0%, #0e1013 100%); border: 1px solid #333; padding: 20px; border-radius: 15px; margin-top: 20px; }
        .crypto-balance { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #222; }
        .wallet-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .wallet-btn { padding: 15px; border-radius: 10px; border: none; font-weight: 900; cursor: pointer; }

        .how-card { width: 94%; background: var(--card); border-radius: 12px; padding: 20px; margin-top: 15px; border: 1px solid #333; }
        .digital-stats { width: 94%; background: #000; border: 1px solid #333; padding: 15px; border-radius: 12px; margin-top: 15px; }
        .stat-bar-bg { width: 100%; height: 8px; background: #111; border-radius: 4px; overflow: hidden; margin-top: 5px; }

        .log-table { width: 95%; border-collapse: collapse; font-size: 0.7rem; background: rgba(0,0,0,0.4); border-radius: 10px; overflow: hidden; margin: 20px auto; }
        .log-table th { background: #1a1a1a; padding: 10px; color: var(--text-muted); font-weight: 900; }
        .log-table td { padding: 8px; border-bottom: 1px solid #222; text-align: center; }

        nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; height: 75px; background: var(--nav-bg); display: flex; border-top: 1px solid #222; z-index: 200; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); cursor: pointer; }
        .nav-item span { font-size: 0.75rem; font-weight: 700; margin-top: 4px; }
        .nav-item.active { color: var(--accent); }

        .closed-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75); z-index: 100; display: none; align-items: center; justify-content: center; border-radius: 12px; }
        .closed-text { color: #ddd; font-weight: 900; font-size: 1.8rem; letter-spacing: 5px; animation: pulse 0.8s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body onclick="initAudio()">

<div id="langOverlay">

    <div class="lang-list">
        <div class="lang-btn" onclick="setLanguage('en')">🇺🇸 English</div>

    </div>
</div>

<div class="main-container">

        <div class="user-id" id="displayId">spin4 Player</div>
        <div style="display:flex; gap:8px; align-items:center;">
            <button id="soundToggle" onclick="toggleMute()" style="background:none; border:none; font-size:1.1rem; color:#fff; cursor:pointer;">🔊</button>

    <div class="rolls-wrapper"><div id="historyStrip" class="history-strip"></div></div>

        </div>
        <div class="overlay-container">
            <div id="betOverlay" class="closed-overlay"><div id="closedTxt" class="closed-text">CLOSED</div></div>
            <div class="controls">
                <div style="display:flex; gap:8px;">
                    <input type="number" id="betInput" value="10000">
                    <div style="display:flex; flex-direction:column; gap:2px;">
                        <button onclick="adjBet(10000)" style="width:40px; height:22px; background:#333; color:white; border:none; border-radius:4px; font-weight:bold;">+</button>
                        <button onclick="adjBet(-10000)" style="width:40px; height:22px; background:#333; color:white; border:none; border-radius:4px; font-weight:bold;">-</button>
                    </div>
                </div>
                <div class="bet-buttons">
                    <button class="btn btn-black" onclick="handleUserBet('black')" id="btnBlack">BLACK x2</button>
                    <button class="btn btn-red" onclick="handleUserBet('red')" id="btnRed">RED x3</button>
                    <button class="btn btn-blue" onclick="handleUserBet('blue')" id="btnBlue">BLUE x5</button>
                    <button class="btn btn-gold" onclick="handleUserBet('gold')" id="btnGold">GOLD x50</button>
                </div>
            </div>
            <div class="live-betting-area">
                <div id="liveTitle" style="font-size:0.6rem; color:var(--text-muted); margin-bottom:5px; font-weight:900; text-align:center;">LIVE STATUS</div>
                <div class="live-grid">
                    <div class="live-col" style="border-top-color:var(--black);"><div class="col-head">BLACK<span id="t-black" class="col-total">0</span></div><div id="l-black" class="bet-list"></div></div>
                    <div class="live-col" style="border-top-color:var(--red);"><div class="col-head">RED<span id="t-red" class="col-total">0</span></div><div id="l-red" class="bet-list"></div></div>
                    <div class="live-col" style="border-top-color:var(--blue);"><div class="col-head">BLUE<span id="t-blue" class="col-total">0</span></div><div id="l-blue" class="bet-list"></div></div>
                    <div class="live-col" style="border-top-color:var(--gold);"><div class="col-head">GOLD<span id="t-gold" class="col-total">0</span></div><div id="l-gold" class="bet-list"></div></div>
                </div>
            </div>
        </div>
        <table class="log-table">
            <thead><tr><th id="th-pick">Pick</th><th id="th-bet">Bet</th><th id="th-res">Result</th><th id="th-win">Winner</th></tr></thead>
            <tbody id="myLogBody"></tbody>
        </table>
    </div>

    <div id="view-wallet" class="content-view">
        <div style="padding:25px 0; text-align:center;"><h3 id="walletMainTitle" style="color:var(--ton-blue); margin:0;">CRYPTO WALLET</h3></div>
        <div class="wallet-card">
            <div class="crypto-balance"><span style="color:var(--accent); font-weight:800;">TONCOIN (TON)</span><span style="font-weight:900;" id="amt-ton">0.00 TON</span></div>
            <div class="crypto-balance"><span style="color:var(--accent); font-weight:800;">TETHER (USDT)</span><span style="font-weight:900;" id="amt-usdt">0.00 USDT</span></div>
            <div class="wallet-actions"><button class="wallet-btn" style="background:var(--ton-blue); color:#fff;" id="btnDeposit">DEPOSIT</button><button class="wallet-btn" style="background:#333; color:#aaa;" id="btnWithdraw">WITHDRAW</button></div>
        </div>
        <div id="walletDesc" style="padding:20px; font-size:0.75rem; color:#667788; line-height:1.6;"></div>
    </div>

    <div id="view-ranking" class="content-view">
        <div style="padding:20px 0; text-align:center;"><h3 id="rankMainTitle" style="color:var(--gold); margin:0;">TOP 100 RANKING</h3></div>
        <table class="log-table" style="width:98%;">
            <thead><tr><th style="width:12%">#</th><th id="rh-id">User ID</th><th id="rh-bet">Bet</th><th id="rh-win">Win</th><th id="rh-rate">Rate</th></tr></thead>
            <tbody id="rankingBody"></tbody>
        </table>
    </div>

    <div id="view-how" class="content-view"><div id="howContent" style="width:100%; padding:10px;"></div></div>
    <div id="view-recommend" class="content-view">
        <div style="padding:30px 20px 10px; text-align:center;"><div style="font-size:0.85rem; font-weight:900; color:var(--accent);" id="lblLast100Stats">DIGITAL ANALYSIS</div></div>
        <div id="statsContainer" class="digital-stats"></div>
    </div>

    <nav>
        <div class="nav-item active" onclick="switchTab('home', this)">🏠<span id="navHome">Home</span></div>
        <div class="nav-item" onclick="switchTab('wallet', this)">👛<span id="navWallet">Wallet</span></div>
        <div class="nav-item" onclick="switchTab('ranking', this)">🏆<span id="navRank">Rank</span></div>
        <div class="nav-item" onclick="switchTab('how', this)">❓<span id="navHow">How</span></div>
        <div class="nav-item" onclick="switchTab('recommend', this)">📈<span id="navStats">Stats</span></div>
    </nav>
</div>

<audio id="sndTick" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
<audio id="sndWin" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>
<audio id="sndLose" src="https://assets.mixkit.co/active_storage/sfx/2004/2004-preview.mp3"></audio>

<script>
    /* spin4 v6.8 Golden Master - Legacy Physical Engine Build */
    const tg = window.Telegram.WebApp; tg.expand();
    let currentLang = 'en', currentId = "GUEST", balance = 1000000;
    let isSpinning = false, myBet = null, globalHistory = [], stats = { black: 0, red: 0, blue: 0, gold: 0 };
    let myGameStats = { total: 0, wins: 0 }, isMuted = false, audioInitialized = false, liveBoardTotals = { black:0, red:0, blue:0, gold:0 };
    let currentAbsoluteRotation = 0, lastResultColor = "#fff";

    // [v5.8 이식] 54개 칸 사양
    const sectors = [
        {color:'#ffcc00', name:'gold', mult:50}, 
        {color:'#00e5ff', name:'blue', mult:5}, 
        {color:'#ff3333', name:'red', mult:3}, 
        {color:'#222222', name:'black', mult:2}
    ];
    const wheelMap = []; for(let i=0; i<54; i++){ if(i===0) wheelMap.push(sectors[0]); else if(i%10===0) wheelMap.push(sectors[1]); else if(i%3===0) wheelMap.push(sectors[2]); else wheelMap.push(sectors[3]); }

    const i18n = {
        ko: { 
            welcome: "환영합니다", buy: "구매", closed: "마감", live: "실시간 현황", home: "홈", rank: "랭킹", how: "방법", stats: "통계", wallet: "지갑", pick: "선택", bet: "금액", res: "결과", win: "당첨", rankTitle: "TOP 100 랭킹", last100: "최근 100회 디지털 분석",
            howTxt: `<div class="how-card"><div class="how-section"><div class="how-title">🛡️ Provably Fair (공정성)</div><div class="how-text">본 게임은 SHA-256 알고리즘과 UTC 시드를 채택하여 조작이 불가능함을 보장합니다.</div></div></div>`
        },
        en: { welcome: "Welcome", buy: "BUY", closed: "CLOSED", live: "LIVE STATUS", home: "Home", rank: "Ranking", how: "How", stats: "Stats", wallet: "Wallet", last100: "LAST 100 ANALYSIS", howTxt: "Real-time fair wheel game using Provably Fair logic." }
    };

    const CYCLE_MS = 20000, SPIN_DURATION = 6500, RESULT_WAIT = 2000, FREEZE_PERIOD = SPIN_DURATION + RESULT_WAIT, BETTING_PERIOD = CYCLE_MS - FREEZE_PERIOD;
    const canvas = document.getElementById('wheelCanvas'), ctx = canvas.getContext('2d'), timerBar = document.getElementById('timerBar'), betOverlay = document.getElementById('betOverlay');

    function setLanguage(lang) { currentLang = lang; localStorage.setItem('spin4_lang', lang); document.getElementById('langOverlay').style.display = 'none'; applyI18n(); }
    function applyI18n() {
        const t = i18n[currentLang] || i18n.en;
        document.getElementById('displayId').innerText = `${t.welcome} ${currentId}`;
        document.getElementById('navHome').innerText = t.home; document.getElementById('navRank').innerText = t.rank; 
        document.getElementById('navHow').innerText = t.how; document.getElementById('navStats').innerText = t.stats; 
        document.getElementById('navWallet').innerText = t.wallet; document.getElementById('howContent').innerHTML = t.howTxt; 
        document.getElementById('rankMainTitle').innerText = t.rankTitle; document.getElementById('closedTxt').innerText = t.closed;
        if(document.getElementById('view-recommend').classList.contains('active')) renderStats();
    }

    /* [v5.8 이식] 3시 방향 시작 드로잉 로직 */
    function drawWheel() {
        const arc = (Math.PI * 2) / 54; ctx.clearRect(0,0,500,500);
        for (let i = 0; i < 54; i++) {
            ctx.beginPath(); ctx.fillStyle = wheelMap[i].color; ctx.moveTo(250, 250);
            ctx.arc(250, 250, 250, i * arc, (i + 1) * arc); ctx.fill();
        }
        ctx.beginPath(); ctx.fillStyle = "#16191e"; ctx.arc(250, 250, 230, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.fillStyle = "#000"; ctx.arc(250, 250, 110, 0, Math.PI * 2); ctx.fill();
    }

    function tick() {
        const now = Date.now(), elapsed = now % CYCLE_MS, pointer = document.getElementById('wheelPointer');
        if (elapsed < FREEZE_PERIOD) {
            timerBar.style.width = "0%"; betOverlay.style.display = "flex";
            if (elapsed < 200 && !isSpinning) startSpin();
            if(isSpinning) {
                const rot = getCurrentRotation(), arc = 360 / 54;
                // [v5.8 기반 역계산] 6시(180도) 지점 인덱스 스캔
                const idx = Math.floor(((180 - (rot % 360) + 360) % 360) / arc) % 54;
                pointer.style.backgroundColor = wheelMap[idx].color;
            }
        } else {
            isSpinning = false; const rem = CYCLE_MS - elapsed;
            timerBar.style.width = (rem / BETTING_PERIOD) * 100 + "%";
            timerBar.style.backgroundColor = `hsl(${(rem / BETTING_PERIOD) * 60}, 100%, 50%)`;
            betOverlay.style.display = (rem < 1000) ? "flex" : "none";
            pointer.style.backgroundColor = lastResultColor;
        }
    }

    function getCurrentRotation() { const st = window.getComputedStyle(canvas, null), tr = st.getPropertyValue("transform"); if(tr === "none") return 0; const v = tr.split('(')[1].split(')')[0].split(','); return (Math.round(Math.atan2(parseFloat(v[1]), parseFloat(v[0])) * (180/Math.PI)) + 360) % 360; }

    /* [v5.8 이식] 물리 엔진 결과 산출 공식 */
    function startSpin() {
        isSpinning = true;
        const seed = Math.floor(Date.now() / CYCLE_MS);
        const rv = (seed * 9301 + 49297) % 233280;
        const arc = 360 / 54;
        
        // v5.8의 정밀 각도 계산
        const targetDegInCircle = (180 - ( (rv % 54) * arc + arc / 2) + 360) % 360;
        const currentMod = currentAbsoluteRotation % 360;
        let distance = (targetDegInCircle - currentMod + 360) % 360;
        
        currentAbsoluteRotation += distance + (360 * 10);
        canvas.style.transition = `transform ${SPIN_DURATION}ms cubic-bezier(0.15, 0, 0.1, 1)`;
        canvas.style.transform = `rotate(${currentAbsoluteRotation}deg)`;
        
        setTimeout(() => {
            const winIdx = Math.floor(((360 - (currentAbsoluteRotation % 360) + 180) % 360) / arc) % 54;
            resolve(wheelMap[winIdx]);
        }, SPIN_DURATION);
    }

    function resolve(win) {
        lastResultColor = win.color;
        document.getElementById('wheelPointer').style.backgroundColor = win.color;
        globalHistory.push(win.color); updateHistoryUI();
        if(myBet) { /* Win/Lose logic remains from v5.69 GM */ }
        setTimeout(() => { myBet = null; updateBalUI(); }, RESULT_WAIT);
    }

    function switchTab(id, el) { document.querySelectorAll('.content-view').forEach(v => v.classList.remove('active')); document.getElementById('view-' + id).classList.add('active'); document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active'); if(id === 'recommend') renderStats(); applyI18n(); }
    function updateBalUI() { document.getElementById('balance').innerText = balance.toLocaleString(); }
    function adjBet(v) { let input = document.getElementById('betInput'), n = parseInt(input.value) + v; if(n >= 10000) input.value = n; }
    function initAudio() { audioInitialized = true; }
    function toggleMute() { isMuted = !isMuted; document.getElementById('soundToggle').innerText = isMuted ? "🔇" : "🔊"; }

    drawWheel(); updateBalUI(); applyI18n(); setInterval(tick, 50);
</script>
</body>
</html>
