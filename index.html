        const nouns = ["Star", "Boss", "Player", "User", "Champ", "Master", "Hero", "One", "Peak"];
        for(let i=1; i<=100; i++) {
            const seed = i * 1234.56; const botId = adjs[Math.floor(seed % adjs.length)] + nouns[Math.floor((seed/7) % nouns.length)] + (Math.floor(seed % 99));
            const totalBet = (2000 - i * 15 + Math.floor(seed % 100)) * 10000; const winRate = (54 - (i/4) + (seed % 2)).toFixed(1); const totalWin = Math.floor(totalBet * (winRate/100) * 1.85);
            tbody.innerHTML += `<tr><td>${i}</td><td style="color:var(--accent); text-align:left; padding-left:15px; font-size:0.55rem;">${botId}</td><td>${(totalBet/1000).toFixed(0)}k</td><td style="color:var(--accent)">${(totalWin/1000).toFixed(0)}k</td><td>${winRate}%</td></tr>`;
        }
    }

    function updateHistoryUI() {
        const strip = document.getElementById('historyStrip'); strip.innerHTML = '';
        const reversedData = [...globalHistory].slice(-100).reverse();
        reversedData.forEach((color, idx) => {
            if(idx < 55) {
                const bar = document.createElement('div');
                let hClass = 'h-black'; if(color === '#ff3333') hClass = 'h-red'; else if(color === '#00e5ff') hClass = 'h-blue'; else if(color === '#ffcc00') hClass = 'h-gold';
                bar.className = 'hist-bar ' + hClass; bar.style.backgroundColor = color; strip.appendChild(bar);
            }
        });
    }

    function syncHistory() { const seed = Math.floor(Date.now() / CYCLE_MS); globalHistory = []; for(let i=1; i<=100; i++) { globalHistory.push(wheelMap[getWinIndex(seed - i).index].color); } updateHistoryUI(); }
    
    /* [v5.49 GM] 3시 방향(90도) 시작 좌표계 - 하쿠님이 가장 만족하신 정밀도 */
    function drawWheel() {
        const segs = 28; // 칸 수를 줄여서 면적 확장
        const arc = (Math.PI * 2) / segs, radius = 260; ctx.clearRect(0,0,560,560); ctx.lineWidth = 18; 
        for (let i = 0; i < segs; i++) {
            ctx.beginPath(); ctx.strokeStyle = wheelMap[i].color;
            ctx.arc(280, 280, radius, i * arc + Math.PI/2 + 0.03, (i + 1) * arc + Math.PI/2 - 0.03); ctx.stroke();
        }
    }

    function tick() {
        const now = Date.now(), elapsed = now % CYCLE_MS, pointer = document.getElementById('wheelPointer');
        if (elapsed < FREEZE_PERIOD) {
            timerBar.style.width = "0%"; betOverlay.style.display = "flex";
            if (elapsed < 200 && !isSpinning) startSpin();
            if(isSpinning) {
                const rot = getCurrentRotation(), arc = 360 / 28;
                // [v5.49 역계산] 6시(180도) 포인터의 실시간 인덱스 스캔
                const idx = Math.floor(((180 - (rot % 360) + 360) % 360) / arc) % 28;
                pointer.style.backgroundColor = wheelMap[idx].color;
            }
        } else {
            isSpinning = false; const rem = CYCLE_MS - elapsed;
            timerBar.style.width = (rem / BETTING_PERIOD) * 100 + "%";
            timerBar.style.backgroundColor = `hsl(${(rem / BETTING_PERIOD) * 60}, 100%, 50%)`;
            betOverlay.style.display = (rem < 1000) ? "flex" : "none";
            pointer.style.backgroundColor = lastResultColor; // 결과 유지
        }
    }

    function getCurrentRotation() { const st = window.getComputedStyle(canvas, null), tr = st.getPropertyValue("transform"); if(tr === "none") return 0; const v = tr.split('(')[1].split(')')[0].split(','); return (Math.round(Math.atan2(parseFloat(v[1]), parseFloat(v[0])) * (180/Math.PI)) + 360) % 360; }

    /* [v5.49 GM] 180도 포인터에 큰 칸의 정중앙 강제 고정 멈춤 */
    function startSpin() {
        isSpinning = true;
        const res = getWinIndex(Math.floor(Date.now() / CYCLE_MS));
        const arc = 360 / 28;
        // 180도(화살표) - (인덱스 각도 + 절반)
        const targetDegInCircle = (180 - (res.index * arc + arc / 2) + 360) % 360;
        const currentMod = currentAbsoluteRotation % 360;
        let distance = (targetDegInCircle - currentMod + 360) % 360;
        currentAbsoluteRotation += distance + (360 * 10);
        canvas.style.transition = `transform ${SPIN_DURATION}ms cubic-bezier(0.15, 0, 0.1, 1)`;
        canvas.style.transform = `rotate(${currentAbsoluteRotation}deg)`;
        setTimeout(() => resolve(wheelMap[res.index]), SPIN_DURATION);
    }

    function resolve(win) {
        lastResultColor = win.color; 
        document.getElementById('wheelPointer').style.backgroundColor = win.color; 
        globalHistory.push(win.color);
        if(myBet) { myGameStats.total++; const winStatus = myBet.type === win.name; if(winStatus) { balance += (myBet.amount * win.mult); myGameStats.wins++; playSound('sndWin'); } else playSound('sndLose'); const row = `<tr><td>${myBet.type.toUpperCase()}</td><td>${myBet.amount.toLocaleString()}</td><td>${winStatus ? 'Win' : 'Lost'}</td><td><span class="winner-dot" style="background:${win.color}"></span></td></tr>`; document.getElementById('myLogBody').insertAdjacentHTML('afterbegin', row); }
        updateHistoryUI(); if(currentId !== "GUEST") { let u = JSON.parse(localStorage.getItem('db_users')); u[currentId].balance = balance; localStorage.setItem('db_users', JSON.stringify(u)); }
        setTimeout(() => { myBet = null; document.querySelectorAll('.bet-buttons .btn').forEach(b => b.classList.remove('selected')); liveBoardTotals = { black:0, red:0, blue:0, gold:0 }; document.querySelectorAll('.bet-list').forEach(l => l.innerHTML = ''); updateBalUI(); }, RESULT_WAIT);
    }

    function getWinIndex(seed) { const rv = (seed * 9301 + 49297) % 233280; return { index: (rv % 28) }; }
    function switchTab(id, el) { document.querySelectorAll('.content-view').forEach(v => v.classList.remove('active')); document.getElementById('view-' + id).classList.add('active'); document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active'); if(id === 'ranking') renderRanking(); if(id === 'recommend') renderStats(); applyI18n(); }
    function handleUserBet(type) { const el = Date.now() % CYCLE_MS; if(el < FREEZE_PERIOD || el > CYCLE_MS - 1000 || myBet) return; const amt = parseInt(document.getElementById('betInput').value); if(amt > balance || amt < 10000) return; balance -= amt; updateBalUI(); myBet = { type, amount: amt }; document.querySelectorAll('.bet-buttons .btn').forEach(b => b.classList.remove('selected')); document.getElementById('btn' + type.charAt(0).toUpperCase() + type.slice(1)).classList.add('selected'); addLiveUI(type, "ME", amt); }
    function updateBalUI() { document.getElementById('balance').innerText = balance.toLocaleString(); }
    function adjBet(v) { let input = document.getElementById('betInput'), n = parseInt(input.value) + v; if(n >= 10000) input.value = n; }
    function handleIdInput() { /* GM login logic */ }
    function initAudio() { audioInitialized = true; }
    function toggleMute() { isMuted = !isMuted; document.getElementById('soundToggle').innerText = isMuted ? "🔇" : "🔊"; }
    function playSound(id) { if(!isMuted && audioInitialized) { const s = document.getElementById(id); s.currentTime = 0; s.play().catch(()=>{}); } }
    function deterministicGlobalSpawn() { const now = Date.now(), ts = Math.floor(now/1000), r = (ts*9301+49297)%233280; if((r%100)<28) { const botId = ["WinAce", "LuckyBot", "TopVip"][r%3] + (r%99), type = (r%100)<40?'black':((r%100)<75?'red':((r%100)<95?'blue':'gold')); addLiveUI(type, botId, (Math.floor(r%15)+1)*10000); } }
    function addLiveUI(type, user, amt) { const list = document.getElementById(`l-${type}`); if(!list || [...list.querySelectorAll('span')].some(s => s.innerText === user)) return; liveBoardTotals[type] += amt; document.getElementById(`t-${type}`).innerText = liveBoardTotals[type].toLocaleString(); const item = document.createElement('div'); item.className = 'bet-item'; item.innerHTML = `<span>${user}</span><b>${(amt/1000).toFixed(0)}k</b>`; list.prepend(item); if(list.children.length > 5) list.lastChild.remove(); }

    syncHistory(); drawWheel(); updateBalUI(); applyI18n(); setInterval(tick, 100);
</script>
</body>
